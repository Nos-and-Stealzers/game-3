<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found</title>
  <meta name="robots" content="noindex,follow">
  <style>
    :root {
      --bg: #f4f7ff;
      --ink: #1e2942;
      --muted: #607194;
      --brand: #195fff;
      --card: #ffffff;
      --line: #dbe4f8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 15% 10%, #d9e5ff 0, transparent 40%), var(--bg);
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      padding: 20px;
    }

    .card {
      width: min(620px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 26px;
      box-shadow: 0 16px 30px rgba(26, 53, 110, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      background: var(--brand);
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404: Page not found</h1>
    <p>The page you requested does not exist or has moved. Return to the game hub and launch from there.</p>
    <a href="index.html">Back to Game Hub</a>
  </main>
</body>
</html>
