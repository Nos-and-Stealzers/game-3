<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Arcade Player</title>
    <meta name="description" content="Fullscreen-style game player with local-first fallback behavior.">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Arcade Player">
    <meta property="og:description" content="Launch games with embed fallback and quick direct-open controls.">
    <meta property="og:image" content="icon.svg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Arcade Player">
    <meta name="twitter:description" content="Launch games in a fullscreen-style player.">
    <meta name="twitter:image" content="icon.svg">
    <link rel="icon" href="TemplateData/favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Archivo+Black&family=Nunito:wght@600;700;800&display=swap");

        :root {
            --bg: #041a3d;
            --bg-layer-1: radial-gradient(circle at 80% -20%, #217df4 0, transparent 42%);
            --bg-layer-2: radial-gradient(circle at 10% 100%, #0cb39c 0, transparent 35%);
            --line: #2058a5;
            --text: #f5f9ff;
            --muted: #b8ccf5;
            --accent: #1388ff;
            --accent-strong: #0062c5;
            --alt: #ffd44a;
            --alt-ink: #513600;
            --bar-bg: rgba(3, 18, 43, 0.88);
            --note-link: #a9c7ff;
            --status-ok-bg: #234737;
            --status-ok-line: #3a7f5d;
            --status-ok-ink: #d0ffe5;
            --status-warn-bg: #6a3f00;
            --status-warn-line: #c68612;
            --status-warn-ink: #fff4dd;
        }

        body[data-theme="light"] {
            --bg: #edf2fa;
            --bg-layer-1: radial-gradient(circle at 90% -10%, #c7dcff 0, transparent 40%);
            --bg-layer-2: radial-gradient(circle at 0% 100%, #d7fff1 0, transparent 35%);
            --line: #b7cceb;
            --text: #16325f;
            --muted: #3d5f93;
            --accent: #0a74f0;
            --accent-strong: #0358ba;
            --alt: #f3ce4f;
            --alt-ink: #533f05;
            --bar-bg: rgba(244, 249, 255, 0.9);
            --note-link: #225fca;
            --status-ok-bg: #ddf6e9;
            --status-ok-line: #7abf99;
            --status-ok-ink: #1a4f33;
            --status-warn-bg: #fff0d9;
            --status-warn-line: #e0b366;
            --status-warn-ink: #674400;
        }

        body[data-theme="gray"] {
            --bg: #1a1d23;
            --bg-layer-1: radial-gradient(circle at 88% -20%, #3f4653 0, transparent 40%);
            --bg-layer-2: radial-gradient(circle at 12% 100%, #2d333e 0, transparent 35%);
            --line: #4b5566;
            --text: #ebeff7;
            --muted: #b7bfce;
            --accent: #8ea6ce;
            --accent-strong: #6f86ae;
            --alt: #b6a26a;
            --alt-ink: #1f1808;
            --bar-bg: rgba(34, 39, 48, 0.92);
            --note-link: #b2c7f0;
            --status-ok-bg: #24362d;
            --status-ok-line: #486958;
            --status-ok-ink: #c6f0d9;
            --status-warn-bg: #4a3a2f;
            --status-warn-line: #7e654d;
            --status-warn-ink: #ffe2c7;
        }

        body[data-theme="black"] {
            --bg: #080a0d;
            --bg-layer-1: radial-gradient(circle at 88% -20%, #232730 0, transparent 40%);
            --bg-layer-2: radial-gradient(circle at 0% 100%, #1a1f26 0, transparent 34%);
            --line: #2f3745;
            --text: #edf1f8;
            --muted: #c1cbdb;
            --accent: #7ea7ff;
            --accent-strong: #5f87dc;
            --alt: #d4b84f;
            --alt-ink: #382c00;
            --bar-bg: rgba(14, 17, 23, 0.88);
            --note-link: #9bbcff;
            --status-ok-bg: #23372d;
            --status-ok-line: #3a7f5d;
            --status-ok-ink: #d0ffe5;
            --status-warn-bg: #4b3320;
            --status-warn-line: #8d6234;
            --status-warn-ink: #ffe3bf;
        }

        * { box-sizing: border-box; }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            height: 100vh;
            font-family: "Nunito", "Trebuchet MS", sans-serif;
            color: var(--text);
            background: var(--bg-layer-1), var(--bg-layer-2), var(--bg);
            display: flex;
            flex-direction: column;
        }

        .bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            background: var(--bar-bg);
            backdrop-filter: blur(8px);
        }

        .title {
            margin: 0;
            font-size: 1.05rem;
            font-family: "Archivo Black", Impact, sans-serif;
            letter-spacing: 0.2px;
            color: var(--muted);
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            border: 0;
            border-radius: 9px;
            padding: 9px 12px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            color: #fff;
            background: var(--accent);
        }

        .btn:hover {
            background: var(--accent-strong);
        }

        .btn.alt {
            background: var(--alt);
            color: var(--alt-ink);
        }

        .btn.alt:hover { background: #f2bf21; }

        .frame-wrap {
            flex: 1;
            padding: 10px;
            display: flex;
            min-height: 0;
            overflow: hidden;
        }

        iframe {
            border: 1px solid var(--line);
            border-radius: 12px;
            display: block;
            width: 100%;
            height: 100%;
            min-height: 100%;
            background: #000;
        }

        .note {
            margin: 0;
            padding: 0 14px 12px;
            color: var(--muted);
            font-size: 0.87rem;
        }

        .status {
            margin: 10px 14px 0;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.88rem;
            display: none;
        }

        .status.warn {
            display: block;
            color: var(--status-warn-ink);
            background: var(--status-warn-bg);
            border: 1px solid var(--status-warn-line);
        }

        .status.ok {
            display: block;
            color: var(--status-ok-ink);
            background: var(--status-ok-bg);
            border: 1px solid var(--status-ok-line);
        }

        .note a {
            color: var(--note-link);
            text-decoration: none;
            font-weight: 700;
        }

        .note a:hover {
            text-decoration: underline;
        }

        body.fast-mode * {
            animation: none !important;
            transition: none !important;
        }

        body.fast-mode .bar {
            backdrop-filter: none;
        }

        @media (max-width: 700px) {
            .frame-wrap { padding: 8px; }
            .bar { padding: 10px; }
        }
    </style>
</head>
<body>
    <header class="bar">
        <h1 id="gameTitle" class="title">Loading game...</h1>
        <div class="actions">
            <a class="btn alt" href="index.html">Back to Library</a>
            <a class="btn alt" href="settings.html">Settings</a>
            <a class="btn alt" href="mailto:lucasgrimm854@gmail.com?bcc=stealzers.com%40gmail.com&subject=Arcade%20feedback">Feedback</a>
            <button id="fullscreenBtn" type="button" class="btn alt">Fullscreen</button>
            <a id="openDirect" class="btn" href="#" target="_blank" rel="noopener noreferrer">Open Direct</a>
        </div>
    </header>

    <section class="frame-wrap">
        <iframe id="gameFrame" title="Game Player" loading="eager" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </section>

    <p id="embedStatus" class="status" role="status" aria-live="polite"></p>

    <p class="note">If a game does not embed due to browser framing rules, use Open Direct. See <a href="privacy.html">Privacy and Terms</a>.</p>

    <script>
        var RECENTS_KEY = "gamehub_recent";
        var GAME_SAVES_KEY = "gamehub_game_saves";
        var THEME_KEY = "gamehub_theme";
        var FAST_MODE_KEY = "gamehub_fast_mode";
        var PERFORMANCE_PROFILE_KEY = "gamehub_performance_profile";
        var DIRECT_LAUNCH_THRESHOLD_MB_KEY = "gamehub_direct_launch_threshold_mb";
        var CATALOG_VERSION = "20260415-4";
        var PROTECTED_GAME_IDS = {
            "fnaf-1": true,
            "fnaf-2": true,
            "fnaf-3": true,
            "fnaf-4": true,
            "fnaf-world": true,
            "fnaf-sl": true,
            "fnaf-ps": true,
            "fnaf-ucn": true,
            "retro-bowl-plus": true
        };

        var storageFallback = {};

        function storageGet(key) {
            try {
                return localStorage.getItem(key);
            } catch (error) {
                return Object.prototype.hasOwnProperty.call(storageFallback, key) ? storageFallback[key] : null;
            }
        }

        function storageSet(key, value) {
            try {
                localStorage.setItem(key, value);
            } catch (error) {
                storageFallback[key] = value;
            }
        }

        function updateRecentGames(gameId) {
            try {
                var value = JSON.parse(storageGet(RECENTS_KEY));
                var recent = Array.isArray(value) ? value : [];
                var withoutCurrent = recent.filter(function (id) { return id !== gameId; });
                withoutCurrent.unshift(gameId);
                storageSet(RECENTS_KEY, JSON.stringify(withoutCurrent.slice(0, 8)));
            } catch (error) {
                storageSet(RECENTS_KEY, JSON.stringify([gameId]));
            }
        }

        function readObject(key) {
            try {
                var value = JSON.parse(storageGet(key) || "{}");
                if (!value || typeof value !== "object" || Array.isArray(value)) {
                    return {};
                }
                return value;
            } catch (error) {
                return {};
            }
        }

        function writeObject(key, value) {
            storageSet(key, JSON.stringify(value || {}));
        }

        function touchGameSave(gameId) {
            if (!gameId) {
                return;
            }
            var saves = readObject(GAME_SAVES_KEY);
            var entry = saves[gameId] && typeof saves[gameId] === "object" ? saves[gameId] : {};
            entry.updatedAt = new Date().toISOString();
            saves[gameId] = entry;
            writeObject(GAME_SAVES_KEY, saves);
        }

        var titleEl = document.getElementById("gameTitle");
        var frame = document.getElementById("gameFrame");
        var frameWrap = document.querySelector(".frame-wrap");
        var fullscreenBtn = document.getElementById("fullscreenBtn");
        var direct = document.getElementById("openDirect");
        var embedStatus = document.getElementById("embedStatus");
        var loadTimer;
        var frameLoaded = false;
        var gameSaveHeartbeatTimer = null;

        function isFullscreenActive() {
            return !!(document.fullscreenElement || document.webkitFullscreenElement);
        }

        function updateFullscreenButton() {
            if (!fullscreenBtn) {
                return;
            }
            fullscreenBtn.textContent = isFullscreenActive() ? "Exit Fullscreen" : "Fullscreen";
        }

        async function toggleFullscreen() {
            try {
                if (isFullscreenActive()) {
                    if (document.exitFullscreen) {
                        await document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    }
                    return;
                }

                var target = frameWrap || document.documentElement;
                if (target.requestFullscreen) {
                    await target.requestFullscreen();
                } else if (target.webkitRequestFullscreen) {
                    target.webkitRequestFullscreen();
                }
            } catch (error) {
                setStatus("warn", "Fullscreen was blocked by the browser. Try Open Direct.");
            } finally {
                updateFullscreenButton();
            }
        }

        function setStatus(type, message) {
            embedStatus.className = "status " + type;
            embedStatus.textContent = message;
        }

        fullscreenBtn.addEventListener("click", toggleFullscreen);
        document.addEventListener("fullscreenchange", updateFullscreenButton);
        document.addEventListener("webkitfullscreenchange", updateFullscreenButton);
        document.addEventListener("keydown", function (event) {
            if ((event.key || "").toLowerCase() === "f" && !event.ctrlKey && !event.metaKey && !event.altKey) {
                event.preventDefault();
                toggleFullscreen();
            }
        });

        function readSetting(key, fallback) {
            var value = storageGet(key);
            return value === null ? fallback : value;
        }

        function applyUiSettings() {
            var theme = readSetting(THEME_KEY, "light");
            if (["light", "gray", "black"].indexOf(theme) === -1) {
                theme = "light";
            }
            document.body.setAttribute("data-theme", theme);
            document.documentElement.style.colorScheme = theme === "black" ? "dark" : "light";

            var fast = readSetting(FAST_MODE_KEY, "0") === "1";
            document.body.classList.toggle("fast-mode", fast);
            return fast;
        }

        function buildFallbackGame() {
            return {
                id: "snow-rider",
                title: "Snow Rider 3D",
                source: "snow-rider.html",
                direct: "snow-rider.html"
            };
        }

        function applyEmbedPolicy(game) {
            var sandbox = typeof game.sandbox === "string" ? game.sandbox.trim() : "";
            if (sandbox) {
                frame.setAttribute("sandbox", sandbox);
            } else {
                frame.removeAttribute("sandbox");
            }
        }

        function isProtectedGame(game) {
            return !!(game && game.id && PROTECTED_GAME_IDS[game.id]);
        }

        async function ensureSignedInUser() {
            if (!window.supabase || typeof window.supabase.createClient !== "function") {
                return null;
            }

            var cfg = window.__GAMEHUB_SUPABASE__ || {};
            if (!cfg.url || !cfg.anonKey) {
                return null;
            }

            var client = window.__GAMEHUB_SIGNIN_CLIENT__;
            if (!client) {
                client = window.__GAMEHUB_SIGNIN_CLIENT__ = window.supabase.createClient(cfg.url, cfg.anonKey);
            }

            try {
                var auth = await client.auth.getUser();
                return auth && auth.data && auth.data.user ? auth.data.user : null;
            } catch (error) {
                console.warn("Auth check error:", error);
                return null;
            }
        }

        function shouldSkipEmbed(game) {
            return game && game.embed === "blocked";
        }

        function shouldPreferDirect(game) {
            return !!(game && game.preferDirect === true && typeof game.direct === "string" && game.direct.length > 0);
        }

        function shouldForceDirectForPerformance(game, profile) {
            if (!game || typeof game !== "object") {
                return false;
            }

            if (["quick", "turbo", "ultra"].indexOf(profile) === -1) {
                return false;
            }

            if (typeof game.direct !== "string" || !game.direct.length) {
                return false;
            }

            var id = String(game.id || "").toLowerCase();
            if (id.indexOf("fnaf-") === 0) {
                return true;
            }

            if (String(game.platform || "").toLowerCase() !== "local") {
                return false;
            }

            return estimateLocalGameSizeMb(game) >= readDirectLaunchThresholdMb();
        }

        function readDirectLaunchThresholdMb() {
            var raw = readSetting(DIRECT_LAUNCH_THRESHOLD_MB_KEY, "80");
            var parsed = parseInt(raw, 10);
            if (!Number.isFinite(parsed)) {
                return 80;
            }
            return Math.max(50, Math.min(2000, parsed));
        }

        function estimateLocalGameSizeMb(game) {
            var estimates = {
                "snow-rider": 70,
                "fnaf-1": 40,
                "fnaf-2": 60,
                "fnaf-3": 45,
                "fnaf-4": 55,
                "fnaf-world": 260,
                "fnaf-sl": 210,
                "fnaf-ps": 90,
                "fnaf-ucn": 240,
                "minecraft-eaglercraft": 190,
                "mini-parkcore": 35,
                "mini-tower-defense": 30,
                "sweet-bakery": 25
            };

            var id = String(game && game.id || "");
            return estimates[id] || 0;
        }

        function isBlockedCatalogGame(game) {
            if (!game || typeof game !== "object") {
                return true;
            }
            var id = typeof game.id === "string" ? game.id.toLowerCase() : "";
            var source = typeof game.source === "string" ? game.source.toLowerCase() : "";
            var direct = typeof game.direct === "string" ? game.direct.toLowerCase() : "";
            var repo = typeof game.repo === "string" ? game.repo.toLowerCase() : "";
            var description = typeof game.description === "string" ? game.description.toLowerCase() : "";
            return id.indexOf("help9-") === 0
                || source.indexOf("mountain658.github.io") !== -1
                || direct.indexOf("mountain658.github.io") !== -1
                || repo.indexOf("/help9") !== -1
                || description.indexOf("help9") !== -1;
        }

        function sanitizeCatalog(list) {
            if (!Array.isArray(list)) {
                return [];
            }
            return list.filter(function (game) {
                return !isBlockedCatalogGame(game);
            });
        }

        async function loadCatalog() {
            try {
                var response = await fetch("games.json?v=" + encodeURIComponent(CATALOG_VERSION), { cache: "no-store" });
                if (!response.ok) {
                    throw new Error("Could not load games.json");
                }
                var data = await response.json();
                return sanitizeCatalog(data);
            } catch (error) {
                return [];
            }
        }

        async function initPlayer() {
            var fastMode = applyUiSettings();
            var performanceProfile = readSetting(PERFORMANCE_PROFILE_KEY, "normal");
            var params = new URLSearchParams(window.location.search);
            var key = params.get("game") || "snow-rider";
            var games = await loadCatalog();

            var game = games.find(function (item) { return item.id === key; }) ||
                games.find(function (item) { return item.id === "snow-rider"; }) ||
                buildFallbackGame();

            if (isProtectedGame(game)) {
                var signedInUser = await ensureSignedInUser();
                if (!signedInUser) {
                    setStatus("warn", "Sign in required. Redirecting to account...");
                    var returnUrl = "play.html?game=" + encodeURIComponent(game.id);
                    window.location.replace("account.html?return=" + encodeURIComponent(returnUrl));
                    return;
                }
            }

            titleEl.textContent = "Now Playing: " + game.title;
            window.__GAMEHUB_CURRENT_GAME__ = {
                id: game.id,
                title: game.title
            };
            direct.href = game.direct;
            updateRecentGames(game.id);
            touchGameSave(game.id);
            applyEmbedPolicy(game);

            if (gameSaveHeartbeatTimer) {
                clearInterval(gameSaveHeartbeatTimer);
            }
            gameSaveHeartbeatTimer = setInterval(function () {
                touchGameSave(game.id);
            }, 30000);

            if (fastMode && typeof game.direct === "string" && game.direct.length > 0) {
                setStatus("warn", "Fast mode active. Opening direct mode...");
                window.location.replace(game.direct);
                return;
            }

            if (shouldPreferDirect(game)) {
                setStatus("warn", "Opening direct mode...");
                window.location.replace(game.direct);
                return;
            }

            if (shouldForceDirectForPerformance(game, performanceProfile)) {
                setStatus("warn", "Optimized launch...");
                window.location.replace(game.direct);
                return;
            }

            if (shouldSkipEmbed(game)) {
                frame.removeAttribute("src");
                frame.style.display = "none";
                setStatus("warn", "This game requires direct mode. Use Open Direct.");
                return;
            }

            frame.style.display = "block";
            frameLoaded = false;
            frame.src = game.source;

            clearTimeout(loadTimer);
            setStatus("ok", "Launching game...");

            frame.addEventListener("load", function () {
                frameLoaded = true;
                clearTimeout(loadTimer);
                setStatus("ok", "Game loaded.");
                touchGameSave(game.id);
            }, { once: true });

            loadTimer = setTimeout(function () {
                if (frameLoaded) {
                    return;
                }
                setStatus("warn", "Game is still loading. If it stays blank, use Open Direct.");
            }, 9000);
        }

        window.__GAMEHUB_PLAY_INIT__ = initPlayer;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.config.js"></script>
    <script>window.__GAMEHUB_CLOUD_SYNC_OPTIONS__ = { intervalMs: 60000, captureIndexedDb: true };</script>
    <script src="js/admin-console.js"></script>
    <script src="js/cloud-autosync.js"></script>
    <script src="js/debug-console.js"></script>
    <script src="js/site-ux.js"></script>
    <script>
        if (window.__GAMEHUB_PLAY_INIT__) {
            window.__GAMEHUB_PLAY_INIT__();
        }
    </script>
</body>
</html>
