<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights at Freddy's 1</title>
    <link rel="icon" href="favicon.ico" />
    <style>
        html {
            display: block;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            overflow: hidden;
            height: 100%;
        }

        body {
            position: relative;
            background-color: black;
            background-image: url(resources/office.png);
            background-position: center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            height: 100%;
        }

        a {
            text-decoration: none;
        }

        .selection {
            height: auto;
            min-height: 100vh;
            width: 100%;
            display: flex;
            overflow: hidden;
        }

        .launcher-text {
            position: absolute;
            left: 50%;
            transform: translate(-50%, 0);
            bottom: 2.5vh;
            z-index: 1;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
        }

        .glitch {
            position: absolute;
            background-image: url(resources/background.gif);
            background-position: center;
            background-size: 50vw;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            opacity: 0.75;
            z-index: -1;
        }

        canvas {
            display: none;
            user-select: none;
        }

        #title {
            position: absolute;
            top: 10vh;
            left: 5vw;
            z-index: 1;
            height: 20vh;
        }

        #animatronic {
            position: absolute;
            top: -5vh;
            right: 7vw;
            height: 120vh;
        }

        .loader {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            left: 50%;
            transform: translate(-50%, 0);
            bottom: 12vh;
            z-index: 1;
            color: white;
            font-family: monospace;
            text-align: center;
            font-weight: lighter;
            width: 85vw;
        }

        .loader h1 {
            margin: 0;
            font-size: 5vw;
        }

        .loader hr{
            margin: 0;
            border: white solid 0.1vw;
            width: 0%;
        }

        .loader h2 {
            margin: 1vh 0;
            font-size: 1.4vw;
        }
    </style>
</head>

<body>
    <canvas id="MMFCanvas" width="1280" height="720"> Your browser does not support Canvas, Please try again.</canvas>
    <div class="selection" id="selection">
        <img id="title" src="resources/title.png">
        <img id="animatronic" src="resources/animatronic.png">
        <div class="loader">
            <h1 id="percentage">0%</h1>
            <hr id="bar">
            <h2 id="stage">STARTING UP...</h2>
        </div>
        <a href="https://discord.gg/xuu8TnSY4b">
            <div class="launcher-text"><img src="resources/launcher-text.png" style="width: 45vw;"></div>
        </a>
    </div>
    <div class="glitch"></div>
    <img src="resources/vignette.png" class="vignette">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../../../js/fnaf-save-sync.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../../js/supabase.config.js"></script>
    <script>window.__GAMEHUB_CLOUD_SYNC_OPTIONS__ = { pagehideOnly: true, runOnStart: false, captureIndexedDb: true };</script>
    <script src="../../../js/cloud-autosync.js"></script>
    <script src="../../../js/fnaf-input-fix.js"></script>
    <script src="../../../js/fnaf-recovery.js"></script>
</body>
<!--Made by irv77-->
<script>
    const parts = 20;
    let gametitle, runtimecanvas
    gametitle = document.title;
    runtimecanvas = "resources/FNAF1HTML5.cch";
    const inputStability = window.installFnafInputStability ? window.installFnafInputStability("MMFCanvas") : null;
    const recovery = window.createFnafRecovery ? window.createFnafRecovery({
        canvasId: "MMFCanvas",
        inputStability: inputStability,
        restartRuntime: function () {
            new Runtime("MMFCanvas", runtimecanvas);
            if (recovery) {
                recovery.onRuntimeStarted();
            }
        }
    }) : null;
    if (recovery) {
        recovery.bind();
    }
    // Prevents touchscreen move
    window.addEventListener("scroll", preventMotion, false);
    window.addEventListener("touchmove", preventMotion, false);
    function preventMotion(event) {
        window.scrollTo(0, 0);
        event.preventDefault();
        event.stopPropagation();
    }
    // Fullscreen Key
    document.addEventListener('keydown', function (event) {
        if (window.__GAMEHUB_FNAF_RECOVERY_ACTIVE__) {
            return;
        }
        var key = (event.key || '').toLowerCase();
        if (key !== 'f' || event.ctrlKey || event.metaKey || event.altKey) {
            return;
        }
        var canvas = document.querySelector('canvas');
        if (!canvas) {
            return;
        }
        event.preventDefault();
        if (document.fullscreenElement) {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
            return;
        }
        if (canvas.requestFullscreen) {
            canvas.requestFullscreen();
        }
    });
    // -----------------
    window.onload = function () {
        const map = new Map();
        const REQUEST_TIMEOUT_MS = 30000;
        const MAX_REQUEST_RETRIES = 2;

        function normalizePercent(percent) {
            if (!Number.isFinite(percent)) return 0;
            return Math.max(0, Math.min(100, Math.floor(percent)));
        }

        function calculateHalfProgress(loaded, total, offset = 0) {
            if (!Number.isFinite(total) || total <= 0) {
                return normalizePercent(offset);
            }
            return normalizePercent((loaded / total) * 50 + offset);
        }

        function progressLabel(text, isEstimated) {
            return isEstimated ? text + ' (estimating...)' : text;
        }

        function showLoadError(message) {
            updateProgress('ERROR: ' + message + ' (refresh to retry)', 0);
        }

        async function fetchWithRetry(url, options = {}, retries = MAX_REQUEST_RETRIES) {
            let lastError = null;
            for (let attempt = 0; attempt <= retries; attempt++) {
                const controller = new AbortController();
                const timeoutMs = document.hidden ? REQUEST_TIMEOUT_MS * 6 : REQUEST_TIMEOUT_MS;
                const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const response = await fetch(url, { ...options, signal: controller.signal });
                    clearTimeout(timeoutId);
                    return response;
                } catch (error) {
                    clearTimeout(timeoutId);
                    lastError = error;
                    if (attempt === retries) {
                        throw lastError;
                    }
                }
            }
            throw lastError || new Error('Request failed');
        }

        function updateProgress(text, percent) {
            const safePercent = normalizePercent(percent);
            document.title = safePercent + '% ' + gametitle
            document.getElementById('percentage').innerHTML = safePercent + '%';
            document.getElementById('bar').style.width = safePercent + '%';
            document.getElementById('stage').innerHTML = text;
        }

        function normalizeResourcePath(value) {
            if (typeof value !== 'string') {
                return '';
            }

            var trimmed = value.split('#')[0].split('?')[0].trim();
            if (!trimmed) {
                return '';
            }

            try {
                trimmed = decodeURIComponent(trimmed);
            } catch (_error) {
            }

            var protocolIndex = trimmed.indexOf('://');
            if (protocolIndex !== -1) {
                var slashAfterHost = trimmed.indexOf('/', protocolIndex + 3);
                trimmed = slashAfterHost === -1 ? '' : trimmed.slice(slashAfterHost + 1);
            }

            if (trimmed.charAt(0) === '/') {
                trimmed = trimmed.slice(1);
            }

            return trimmed;
        }

        function resourceBasename(value) {
            var normalized = normalizeResourcePath(value);
            if (!normalized) {
                return '';
            }
            var parts = normalized.split('/');
            return parts[parts.length - 1] || '';
        }

        function resolveMappedResourceUrl(value) {
            var normalized = normalizeResourcePath(value);
            if (!normalized) {
                return '';
            }

            if (map.has(normalized)) {
                return map.get(normalized);
            }

            var lowered = normalized.toLowerCase();
            if (map.has(lowered)) {
                return map.get(lowered);
            }

            var fileName = resourceBasename(normalized);
            if (fileName && map.has(fileName)) {
                return map.get(fileName);
            }

            var loweredName = fileName ? fileName.toLowerCase() : '';
            if (loweredName && map.has(loweredName)) {
                return map.get(loweredName);
            }

            return '';
        }

        function mapResource(filePath, objectUrl) {
            var normalized = normalizeResourcePath(filePath);
            var fileName = resourceBasename(filePath);

            if (normalized) {
                map.set(normalized, objectUrl);
                map.set(normalized.toLowerCase(), objectUrl);
            }
            if (fileName) {
                map.set(fileName, objectUrl);
                map.set(fileName.toLowerCase(), objectUrl);
            }
        }

        async function intercept() {
            const ogfetch = window.fetch;
            window.fetch = async function (input, init) {
                var requestUrl = typeof input === 'string' ? input : (input && typeof input.url === 'string' ? input.url : '');
                var mappedUrl = resolveMappedResourceUrl(requestUrl);
                if (mappedUrl) {
                    return ogfetch(mappedUrl, init);
                }
                return ogfetch(input, init);
            };

            const ogopen = XMLHttpRequest.prototype.open;
            XMLHttpRequest.prototype.open = function (method, url) {
                var mappedUrl = resolveMappedResourceUrl(url);
                var nextUrl = mappedUrl || url;
                var args = Array.prototype.slice.call(arguments, 2);
                return ogopen.call.apply(ogopen, [this, method, nextUrl].concat(args));
            };

            const types = [HTMLImageElement, HTMLAudioElement, HTMLVideoElement];
            for (const Tag of types) {
                const descriptor = Object.getOwnPropertyDescriptor(Tag.prototype, 'src');
                if (descriptor && descriptor.set) {
                    Object.defineProperty(Tag.prototype, 'src', {
                        configurable: true,
                        enumerable: true,
                        get: descriptor.get,
                        set: function (val) {
                            var mappedUrl = resolveMappedResourceUrl(val);
                            if (mappedUrl) {
                                val = mappedUrl;
                            }
                            descriptor.set.call(this, val);
                        }
                    });
                }
            }
        }

        async function extract() {
            const res = await fetchWithRetry("resources.zip");
            if (!res.ok) {
                throw new Error('Unable to download archive');
            }
            if (!res.body) {
                throw new Error('Archive stream unavailable');
            }

            const contentLength = res.headers.get("Content-Length");
            const total = parseInt(contentLength, 10);
            const isDownloadSizeEstimated = !Number.isFinite(total) || total <= 0;
            const reader = res.body.getReader();
            let loaded = 0;
            const chunks = [];

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
                loaded += value.length;
                updateProgress(progressLabel('RETURNING GEARS...', isDownloadSizeEstimated), calculateHalfProgress(loaded, total));
            }

            const arrayBuffer = await new Blob(chunks).arrayBuffer();
            const zip = await JSZip.loadAsync(arrayBuffer);
            const files = Object.keys(zip.files).filter(name => !zip.files[name].dir);
            const totalFiles = files.length;

            for (let i = 0; i < totalFiles; i++) {
                const file = zip.files[files[i]];
                const blob = await file.async("blob");
                const url = URL.createObjectURL(blob);
                mapResource(files[i], url);
                updateProgress('BOOTING UP ARCHIVE...', calculateHalfProgress(i + 1, totalFiles, 50));
            }
        }

        async function wedone() {
            await extract();
            await intercept();

            const script = document.createElement('script');
            script.src = 'src/Runtime.js';
            script.onload = () => {
                new Runtime("MMFCanvas", runtimecanvas);
                document.onselectstart = null;
                if (recovery) {
                    recovery.onRuntimeStarted();
                }
            };
            script.onerror = () => {
                showLoadError('RUNTIME LOAD FAILED');
            };
            document.getElementById('MMFCanvas').style.display = 'block';
            document.getElementById('selection').style.display = 'none';
            document.title = gametitle;
            if (inputStability) {
                inputStability.releaseStuckInput();
                setTimeout(inputStability.focusCanvas, 0);
            }
            document.head.appendChild(script);
        }

        const originalFetch = window.fetch;

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = new Array(fileParts.length);
                let loadedParts = 0;

                Promise.all(fileParts.map((part, index) =>
                    fetchWithRetry(part).then((response) => {
                        if (!response.ok) throw new Error("Missing part: " + part);
                        return response.arrayBuffer();
                    }).then((data) => {
                        buffers[index] = data;
                        loadedParts++;
                        updateProgress(progressLabel('LOCATING ARCHIVE...', true), calculateHalfProgress(loadedParts, fileParts.length));
                    })
                )).then(() => {
                    let mergedBlob = new Blob(buffers);
                    let mergedFileUrl = URL.createObjectURL(mergedBlob);
                    resolve(mergedFileUrl);
                }).catch(reject);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }

        function preflightParts(fileParts) {
            return Promise.all(fileParts.map(async function (part) {
                try {
                    const headResponse = await fetchWithRetry(part, { method: "HEAD" });
                    if (headResponse && headResponse.ok) {
                        return null;
                    }
                } catch (_headError) {
                }

                try {
                    const probeResponse = await fetchWithRetry(part, {
                        method: "GET",
                        headers: { Range: "bytes=0-0" }
                    });
                    if (probeResponse && probeResponse.ok) {
                        return null;
                    }
                } catch (_probeError) {
                }

                return part;
            })).then(function (results) {
                return results.filter(Boolean);
            });
        }

        function formatLoaderError(error) {
            var message = error && error.message ? String(error.message) : "";
            var missingPrefix = "Missing part: ";
            if (message.indexOf(missingPrefix) === 0) {
                var missingPart = message.slice(missingPrefix.length);
                return "MISSING FILE " + missingPart + " (upload all resources.zip.part files)";
            }

            var missingManyPrefix = "Missing parts: ";
            if (message.indexOf(missingManyPrefix) === 0) {
                var missingParts = message.slice(missingManyPrefix.length);
                return "MISSING FILES " + missingParts + " (upload all resources.zip.part files)";
            }
            if (message.indexOf("Unable to download archive") !== -1) {
                return "ARCHIVE DOWNLOAD FAILED";
            }
            if (message.indexOf("Archive stream unavailable") !== -1) {
                return "ARCHIVE STREAM FAILED";
            }
            return "LOADING FAILED";
        }
        const resourceParts = getParts("src/resources.zip", 1, parts);
        preflightParts(resourceParts)
            .then((missingParts) => {
                if (missingParts.length) {
                    throw new Error("Missing parts: " + missingParts.join(", "));
                }
                return Promise.all([mergeFiles(resourceParts)]);
            })
            .then(([resources]) => {
            window.fetch = async function (url, ...args) {
                var requestUrl = typeof url === "string" ? url : (url && typeof url.url === "string" ? url.url : "");
                if (requestUrl && requestUrl.endsWith("resources.zip")) {
                    return originalFetch(resources, ...args);
                }
                return originalFetch(url, ...args);
            };
            return wedone();
        }).catch((error) => {
            console.error('FNAF loader failed:', error);
            showLoadError(formatLoaderError(error));
        });
    };
</script>
</html>
