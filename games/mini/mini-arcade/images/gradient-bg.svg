<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#98D8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#4f46e5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.2" />
    </linearGradient>
    <radialGradient id="cloudGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.1);stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Main sky gradient -->
  <rect width="1920" height="1080" fill="url(#skyGradient)"/>
  
  <!-- Cloud shapes for texture -->
  <ellipse cx="300" cy="200" rx="80" ry="40" fill="url(#cloudGradient)"/>
  <ellipse cx="250" cy="180" rx="60" ry="30" fill="url(#cloudGradient)"/>
  <ellipse cx="350" cy="190" rx="70" ry="35" fill="url(#cloudGradient)"/>
  
  <ellipse cx="800" cy="300" rx="100" ry="50" fill="url(#cloudGradient)"/>
  <ellipse cx="750" cy="280" rx="80" ry="40" fill="url(#cloudGradient)"/>
  <ellipse cx="850" cy="290" rx="90" ry="45" fill="url(#cloudGradient)"/>
  
  <ellipse cx="1400" cy="150" rx="90" ry="45" fill="url(#cloudGradient)"/>
  <ellipse cx="1350" cy="130" rx="70" ry="35" fill="url(#cloudGradient)"/>
  <ellipse cx="1450" cy="140" rx="80" ry="40" fill="url(#cloudGradient)"/>
  
  <ellipse cx="600" cy="450" rx="120" ry="60" fill="url(#cloudGradient)"/>
  <ellipse cx="550" cy="430" rx="90" ry="45" fill="url(#cloudGradient)"/>
  <ellipse cx="650" cy="440" rx="100" ry="50" fill="url(#cloudGradient)"/>
  
  <!-- Additional atmospheric elements -->
  <circle cx="1600" cy="600" r="15" fill="rgba(255,255,255,0.2)"/>
  <circle cx="200" cy="700" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="1200" cy="800" r="18" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Subtle texture overlay -->
  <rect width="1920" height="1080" fill="url(#skyGradient)" opacity="0.3"/>
</svg>
