<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Main content area -->
  <rect x="100" y="100" width="1000" height="430" fill="rgba(255,255,255,0.1)" rx="20" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Title -->
  <text x="600" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="white" filter="url(#glow)">
    🎮 Mini Arcade
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600" fill="rgba(255,255,255,0.9)">
    Amazing Browser Games
  </text>
  
  <!-- Game icons -->
  <text x="400" y="450" text-anchor="middle" font-size="48">🌈</text>
  <text x="500" y="450" text-anchor="middle" font-size="48">🎯</text>
  <text x="600" y="450" text-anchor="middle" font-size="48">🧩</text>
  <text x="700" y="450" text-anchor="middle" font-size="48">🚀</text>
  <text x="800" y="450" text-anchor="middle" font-size="48">🏰</text>
  
  <!-- Bottom text -->
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="rgba(255,255,255,0.8)">
    Play instantly in your browser • No downloads required
  </text>
</svg>
