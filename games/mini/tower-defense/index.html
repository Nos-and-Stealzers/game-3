<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Campus Tower Defense: Redux</title>
  <style>
    :root {
      --bg-a: #eff6ff;
      --bg-b: #dbeafe;
      --ink: #10294e;
      --line: rgba(28,64,124,0.2);
      --panel: rgba(255,255,255,0.82);
      --accent: #0f6fff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 8% -12%, var(--bg-b), transparent 42%), linear-gradient(180deg, var(--bg-a), #f8fbff);
      display: grid;
      place-items: center;
      padding: 14px;
    }
    .shell {
      width: min(1040px, 96vw);
      display: grid;
      gap: 10px;
    }
    .hud {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 10px 12px;
      backdrop-filter: blur(4px);
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 5px 10px;
      font-size: 0.82rem;
      font-weight: 800;
      background: rgba(255,255,255,0.6);
    }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,0.74);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      padding: 7px 10px;
      cursor: pointer;
    }
    .btn.active { border-color: var(--accent); color: var(--accent); }
    canvas {
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #dcecff;
      box-shadow: 0 12px 24px rgba(16,41,78,0.18);
    }
    .note {
      margin: 0;
      font-size: 0.86rem;
      color: color-mix(in srgb, var(--ink) 70%, white);
    }
    .note b { color: var(--ink); }
  </style>
</head>
<body>
  <section class="shell">
    <div class="hud">
      <div class="chips">
        <span class="chip">Coins: <b id="coins">0</b></span>
        <span class="chip">Lives: <b id="lives">0</b></span>
        <span class="chip">Wave: <b id="wave">1</b></span>
        <span class="chip">Mode: <b id="mode">Normal</b></span>
        <span class="chip">Path Seed: <b id="seedOut">-</b></span>
      </div>
      <div class="tools">
        <select id="difficulty" class="btn" aria-label="Difficulty">
          <option value="rookie">Rookie</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
        <button id="speedBtn" class="btn" type="button">Speed 1x</button>
        <button id="dartBtn" class="btn active" type="button">Dart 40</button>
        <button id="blastBtn" class="btn" type="button">Blast 70</button>
        <button id="sniperBtn" class="btn" type="button">Sniper 95</button>
        <button id="newMapBtn" class="btn" type="button">New Map</button>
        <button id="restartBtn" class="btn" type="button">Restart</button>
      </div>
    </div>

    <canvas id="game" width="1000" height="560"></canvas>
    <p class="note"><b>How to play:</b> Place towers on grass, click a tower to upgrade it, press speed for faster rounds. Survive leaks.</p>
  </section>

  <script>
    (function () {
      var THEME_KEY = "gamehub_theme";
      var canvas = document.getElementById("game");
      var ctx = canvas.getContext("2d");
      var coinsEl = document.getElementById("coins");
      var livesEl = document.getElementById("lives");
      var waveEl = document.getElementById("wave");
      var modeEl = document.getElementById("mode");
      var seedOutEl = document.getElementById("seedOut");
      var difficultySelect = document.getElementById("difficulty");
      var speedBtn = document.getElementById("speedBtn");
      var dartBtn = document.getElementById("dartBtn");
      var blastBtn = document.getElementById("blastBtn");
      var sniperBtn = document.getElementById("sniperBtn");
      var newMapBtn = document.getElementById("newMapBtn");
      var restartBtn = document.getElementById("restartBtn");

      var W = canvas.width;
      var H = canvas.height;
      var TILE = 56;
      var GRID_X = 110;
      var GRID_Y = 32;
      var COLS = 14;
      var ROWS = 9;

      var DIFFICULTY = {
        rookie: { label: "Rookie", coins: 180, lives: 28, hpScale: 1.8, speedScale: 0.92, spawnBase: 22, waveDelay: 92 },
        normal: { label: "Normal", coins: 130, lives: 20, hpScale: 2.0, speedScale: 1.0, spawnBase: 18, waveDelay: 76 },
        hard: { label: "Hard", coins: 95, lives: 15, hpScale: 2.3, speedScale: 1.1, spawnBase: 14, waveDelay: 62 }
      };

      var palettes = {
        light: { bgA: "#eff6ff", bgB: "#dbeafe", ink: "#10294e", line: "rgba(28,64,124,0.2)", grass: "#c7e4b8", grass2: "#b5d79f", path: "#e8b77a" },
        gray: { bgA: "#222933", bgB: "#3d4655", ink: "#e6edf8", line: "rgba(178,194,216,0.24)", grass: "#5b6c5a", grass2: "#4e5f4d", path: "#8b7c64" },
        black: { bgA: "#0f141b", bgB: "#273142", ink: "#eef3ff", line: "rgba(190,205,232,0.26)", grass: "#4f644e", grass2: "#425643", path: "#8a765d" }
      };

      var state;
      var difficulty = "normal";
      var selectedTower = "dart";
      var tickMultiplier = 1;
      var pathSeed = Math.floor(Math.random() * 1000000);
      var pathTiles = [];

      function rng(seed) {
        var s = seed >>> 0;
        return function () {
          s = (s * 1664525 + 1013904223) >>> 0;
          return s / 4294967296;
        };
      }

      function readTheme() {
        var t = "light";
        try { t = localStorage.getItem(THEME_KEY) || "light"; } catch (error) { t = "light"; }
        return ["light", "gray", "black"].indexOf(t) === -1 ? "light" : t;
      }

      function applyTheme() {
        var p = palettes[readTheme()];
        document.documentElement.style.setProperty("--bg-a", p.bgA);
        document.documentElement.style.setProperty("--bg-b", p.bgB);
        document.documentElement.style.setProperty("--ink", p.ink);
        document.documentElement.style.setProperty("--line", p.line);
        document.documentElement.style.colorScheme = readTheme() === "black" ? "dark" : "light";
      }

      function tileCenter(col, row) {
        return { x: GRID_X + col * TILE + TILE / 2, y: GRID_Y + row * TILE + TILE / 2 };
      }

      function generatePath(seed) {
        var rand = rng(seed);
        var row = 3 + Math.floor(rand() * 3);
        var path = [];
        var col;
        for (col = 0; col < COLS; col++) {
          path.push([col, row]);
          var dir = rand();
          if (dir < 0.35) row -= 1;
          else if (dir > 0.65) row += 1;
          row = Math.max(1, Math.min(ROWS - 2, row));
        }
        return path;
      }

      function isPath(col, row) {
        for (var i = 0; i < pathTiles.length; i++) {
          if (pathTiles[i][0] === col && pathTiles[i][1] === row) return true;
        }
        return false;
      }

      function towerAt(col, row) {
        return state.towers.find(function (t) { return t.col === col && t.row === row; });
      }

      function syncHud() {
        coinsEl.textContent = String(state.coins);
        livesEl.textContent = String(state.lives);
        waveEl.textContent = String(state.wave);
        modeEl.textContent = DIFFICULTY[difficulty].label;
        seedOutEl.textContent = String(pathSeed);
      }

      function setTowerButtons() {
        dartBtn.classList.toggle("active", selectedTower === "dart");
        blastBtn.classList.toggle("active", selectedTower === "blast");
        sniperBtn.classList.toggle("active", selectedTower === "sniper");
      }

      function buildWave() {
        var cfg = DIFFICULTY[difficulty];
        var w = state.wave;
        var q = [];
        var i;
        for (i = 0; i < 7 + w; i++) {
          q.push({ type: "runner", hp: 12 + Math.floor(w * cfg.hpScale), speed: (1.28 + w * 0.04) * cfg.speedScale, value: 9 });
        }
        for (i = 0; i < Math.floor(w / 2); i++) {
          q.push({ type: "tank", hp: 34 + Math.floor(w * (cfg.hpScale * 2.4)), speed: (0.72 + w * 0.03) * cfg.speedScale, value: 18 });
        }
        for (i = 0; i < Math.floor((w + 1) / 3); i++) {
          q.push({ type: "swift", hp: 9 + Math.floor(w * cfg.hpScale), speed: (1.86 + w * 0.05) * cfg.speedScale, value: 11 });
        }

        for (i = q.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = q[i]; q[i] = q[j]; q[j] = tmp;
        }
        state.spawnQueue = q;
      }

      function spawnEnemy(spec) {
        var s = tileCenter(pathTiles[0][0], pathTiles[0][1]);
        state.enemies.push({
          x: s.x,
          y: s.y,
          hp: spec.hp,
          maxHp: spec.hp,
          speed: spec.speed,
          value: spec.value,
          kind: spec.type,
          seg: 0
        });
      }

      function resetGame(newSeed) {
        var cfg = DIFFICULTY[difficulty];
        if (newSeed) pathSeed = Math.floor(Math.random() * 1000000);
        pathTiles = generatePath(pathSeed);
        state = {
          t: 0,
          coins: cfg.coins,
          lives: cfg.lives,
          wave: 1,
          spawnQueue: [],
          spawnDelay: 0,
          betweenWaves: cfg.waveDelay,
          towers: [],
          enemies: [],
          projectiles: [],
          gameOver: false
        };
        tickMultiplier = 1;
        speedBtn.textContent = "Speed 1x";
        buildWave();
        syncHud();
      }

      function advanceWaves() {
        if (state.gameOver) return;
        var cfg = DIFFICULTY[difficulty];

        if (state.spawnQueue.length > 0) {
          state.spawnDelay -= 1;
          if (state.spawnDelay <= 0) {
            spawnEnemy(state.spawnQueue.shift());
            state.spawnDelay = cfg.spawnBase + Math.floor(Math.random() * 14);
          }
          return;
        }

        if (state.enemies.length === 0) {
          state.betweenWaves -= 1;
          if (state.betweenWaves <= 0) {
            state.wave += 1;
            state.betweenWaves = cfg.waveDelay;
            buildWave();
            syncHud();
          }
        }
      }

      function updateEnemies() {
        for (var i = state.enemies.length - 1; i >= 0; i--) {
          var e = state.enemies[i];
          var ns = Math.min(e.seg + 1, pathTiles.length - 1);
          var target = tileCenter(pathTiles[ns][0], pathTiles[ns][1]);
          var dx = target.x - e.x;
          var dy = target.y - e.y;
          var d = Math.hypot(dx, dy) || 1;

          if (d < e.speed + 0.5) {
            e.seg = ns;
          } else {
            e.x += (dx / d) * e.speed;
            e.y += (dy / d) * e.speed;
          }

          if (e.seg >= pathTiles.length - 1 && Math.abs(e.x - target.x) < 3 && Math.abs(e.y - target.y) < 3) {
            state.enemies.splice(i, 1);
            state.lives -= 1;
            syncHud();
            if (state.lives <= 0) state.gameOver = true;
            continue;
          }

          if (e.hp <= 0) {
            state.enemies.splice(i, 1);
            state.coins += e.value;
            syncHud();
          }
        }
      }

      function updateTowers() {
        state.towers.forEach(function (t) {
          t.cooldown -= 1;
          if (t.cooldown > 0) return;

          var c = tileCenter(t.col, t.row);
          var chosen = null;
          var best = -1;
          for (var i = 0; i < state.enemies.length; i++) {
            var e = state.enemies[i];
            var dist = Math.hypot(e.x - c.x, e.y - c.y);
            if (dist > t.range) continue;
            var priority = t.kind === "sniper" ? e.maxHp : e.seg;
            if (priority > best) {
              best = priority;
              chosen = e;
            }
          }

          if (!chosen) return;

          t.cooldown = t.fireRate;
          state.projectiles.push({
            x: c.x,
            y: c.y,
            tx: chosen,
            speed: t.kind === "blast" ? 5.4 : (t.kind === "sniper" ? 10 : 7),
            damage: t.damage,
            splash: t.kind === "blast" ? 36 : 0,
            color: t.kind === "blast" ? "#fb7185" : (t.kind === "sniper" ? "#a855f7" : "#0ea5e9")
          });
        });
      }

      function updateProjectiles() {
        for (var i = state.projectiles.length - 1; i >= 0; i--) {
          var p = state.projectiles[i];
          if (!p.tx || p.tx.hp <= 0) {
            state.projectiles.splice(i, 1);
            continue;
          }

          var dx = p.tx.x - p.x;
          var dy = p.tx.y - p.y;
          var d = Math.hypot(dx, dy) || 1;
          p.x += (dx / d) * p.speed;
          p.y += (dy / d) * p.speed;

          if (d < p.speed + 2) {
            if (p.splash > 0) {
              for (var j = 0; j < state.enemies.length; j++) {
                var e = state.enemies[j];
                if (Math.hypot(e.x - p.tx.x, e.y - p.tx.y) <= p.splash) {
                  e.hp -= p.damage;
                }
              }
            } else {
              p.tx.hp -= p.damage;
            }
            state.projectiles.splice(i, 1);
          }
        }
      }

      function update() {
        for (var k = 0; k < tickMultiplier; k++) {
          state.t += 1;
          advanceWaves();
          updateEnemies();
          updateTowers();
          updateProjectiles();
          if (state.gameOver) break;
        }
      }

      function drawGrid() {
        var p = palettes[readTheme()];
        var bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, p.bgB);
        bg.addColorStop(1, p.bgA);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        for (var c = 0; c < COLS; c++) {
          for (var r = 0; r < ROWS; r++) {
            var x = GRID_X + c * TILE;
            var y = GRID_Y + r * TILE;
            ctx.fillStyle = isPath(c, r) ? p.path : ((c + r) % 2 ? p.grass : p.grass2);
            ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
          }
        }
      }

      function drawTowers() {
        state.towers.forEach(function (t) {
          var c = tileCenter(t.col, t.row);
          ctx.fillStyle = t.kind === "blast" ? "#fb7185" : (t.kind === "sniper" ? "#a855f7" : "#0ea5e9");
          ctx.beginPath();
          ctx.arc(c.x, c.y, 16, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#0f172a";
          ctx.font = "700 12px Trebuchet MS, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(String(t.level), c.x, c.y + 4);
        });
      }

      function drawEnemies() {
        state.enemies.forEach(function (e) {
          var color = e.kind === "tank" ? "#7c3aed" : (e.kind === "swift" ? "#f59e0b" : "#ef4444");
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(e.x, e.y, 12, 0, Math.PI * 2);
          ctx.fill();
          var ratio = Math.max(0, e.hp / e.maxHp);
          ctx.fillStyle = "rgba(15,23,42,0.45)";
          ctx.fillRect(e.x - 14, e.y - 20, 28, 4);
          ctx.fillStyle = "#22c55e";
          ctx.fillRect(e.x - 14, e.y - 20, 28 * ratio, 4);
        });
      }

      function drawProjectiles() {
        state.projectiles.forEach(function (p) {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.splash > 0 ? 5 : 4, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawOverlay() {
        if (!state.gameOver) return;
        ctx.fillStyle = "rgba(2,6,23,0.62)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "800 42px Trebuchet MS, sans-serif";
        ctx.fillText("Game Over", W / 2, H / 2 - 10);
        ctx.font = "700 20px Trebuchet MS, sans-serif";
        ctx.fillText("Try a new map or lower difficulty", W / 2, H / 2 + 24);
      }

      function draw() {
        drawGrid();
        drawTowers();
        drawEnemies();
        drawProjectiles();
        drawOverlay();
      }

      function frame() {
        update();
        draw();
        requestAnimationFrame(frame);
      }

      function placeTower(col, row) {
        if (state.gameOver || isPath(col, row) || towerAt(col, row)) return;

        var def = {
          dart: { cost: 40, range: 172, damage: 8, fireRate: 24 },
          blast: { cost: 70, range: 124, damage: 16, fireRate: 46 },
          sniper: { cost: 95, range: 400, damage: 20, fireRate: 58 }
        }[selectedTower];

        if (!def || state.coins < def.cost) return;

        state.coins -= def.cost;
        state.towers.push({
          col: col,
          row: row,
          kind: selectedTower,
          level: 1,
          range: def.range,
          damage: def.damage,
          fireRate: def.fireRate,
          cooldown: 8
        });
        syncHud();
      }

      function upgradeTower(t) {
        var cost = 22 + (t.level - 1) * 14;
        if (state.coins < cost || t.level >= 5) return;
        state.coins -= cost;
        t.level += 1;
        if (t.kind === "blast") {
          t.damage += 7;
          t.range += 8;
          t.fireRate = Math.max(24, t.fireRate - 2);
        } else if (t.kind === "sniper") {
          t.damage += 10;
          t.range += 14;
          t.fireRate = Math.max(30, t.fireRate - 3);
        } else {
          t.damage += 3;
          t.range += 10;
          t.fireRate = Math.max(12, t.fireRate - 2);
        }
        syncHud();
      }

      canvas.addEventListener("pointerdown", function (event) {
        var rect = canvas.getBoundingClientRect();
        var sx = canvas.width / rect.width;
        var sy = canvas.height / rect.height;
        var x = (event.clientX - rect.left) * sx;
        var y = (event.clientY - rect.top) * sy;

        var col = Math.floor((x - GRID_X) / TILE);
        var row = Math.floor((y - GRID_Y) / TILE);
        if (col < 0 || row < 0 || col >= COLS || row >= ROWS) return;

        var t = towerAt(col, row);
        if (t) upgradeTower(t);
        else placeTower(col, row);
      });

      difficultySelect.addEventListener("change", function () {
        var val = difficultySelect.value;
        difficulty = Object.prototype.hasOwnProperty.call(DIFFICULTY, val) ? val : "normal";
        resetGame(false);
      });

      speedBtn.addEventListener("click", function () {
        tickMultiplier = tickMultiplier === 1 ? 2 : 1;
        speedBtn.textContent = tickMultiplier === 1 ? "Speed 1x" : "Speed 2x";
      });

      dartBtn.addEventListener("click", function () { selectedTower = "dart"; setTowerButtons(); });
      blastBtn.addEventListener("click", function () { selectedTower = "blast"; setTowerButtons(); });
      sniperBtn.addEventListener("click", function () { selectedTower = "sniper"; setTowerButtons(); });
      newMapBtn.addEventListener("click", function () { resetGame(true); });
      restartBtn.addEventListener("click", function () { resetGame(false); });

      applyTheme();
      window.addEventListener("focus", applyTheme);
      window.addEventListener("storage", function (event) {
        if (event.key === THEME_KEY) applyTheme();
      });
      setTowerButtons();
      resetGame(false);
      frame();
    })();
  </script>
</body>
</html>
