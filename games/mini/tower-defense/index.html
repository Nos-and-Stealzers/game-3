<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Campus Tower Defense: Redux</title>
  <style>
    :root {
      --bg-a: #eff6ff;
      --bg-b: #dbeafe;
      --ink: #10294e;
      --line: rgba(28,64,124,0.2);
      --panel: rgba(255,255,255,0.82);
      --accent: #0f6fff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 8% -12%, var(--bg-b), transparent 42%), linear-gradient(180deg, var(--bg-a), #f8fbff);
      display: grid;
      place-items: center;
      padding: 14px;
    }
    .shell {
      width: min(1040px, 96vw);
      display: grid;
      gap: 10px;
    }
    .hud {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 10px 12px;
      backdrop-filter: blur(4px);
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 5px 10px;
      font-size: 0.82rem;
      font-weight: 800;
      background: rgba(255,255,255,0.6);
    }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,0.74);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      padding: 7px 10px;
      cursor: pointer;
    }
    .btn.active { border-color: var(--accent); color: var(--accent); }
    canvas {
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #dcecff;
      box-shadow: 0 12px 24px rgba(16,41,78,0.18);
    }
    .note {
      margin: 0;
      font-size: 0.86rem;
      color: color-mix(in srgb, var(--ink) 70%, white);
    }
    .note b { color: var(--ink); }

    .meta-panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 10px 12px;
      display: grid;
      gap: 8px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px;
      align-items: start;
    }

    .mini-label {
      font-size: 0.8rem;
      font-weight: 800;
      color: color-mix(in srgb, var(--ink) 80%, white);
      margin-bottom: 4px;
      display: block;
    }

    .leaderboard {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .leaderboard th,
    .leaderboard td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 5px 4px;
    }

    .leaderboard th {
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: color-mix(in srgb, var(--ink) 75%, white);
    }
  </style>
</head>
<body>
  <section class="shell">
    <div class="hud">
      <div class="chips">
        <span class="chip">Coins: <b id="coins">0</b></span>
        <span class="chip">Lives: <b id="lives">0</b></span>
        <span class="chip">Wave: <b id="wave">1</b></span>
        <span class="chip">Mode: <b id="mode">Normal</b></span>
        <span class="chip">Path Seed: <b id="seedOut">-</b></span>
        <span class="chip">Round: <b id="planOut">-</b></span>
      </div>
      <div class="tools">
        <select id="difficulty" class="btn" aria-label="Difficulty">
          <option value="rookie">Rookie</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
        <select id="targetMode" class="btn" aria-label="Target mode">
          <option value="first" selected>Target: First</option>
          <option value="last">Target: Last</option>
          <option value="strong">Target: Strong</option>
          <option value="close">Target: Close</option>
        </select>
        <button id="speedBtn" class="btn" type="button">Speed 1x</button>
        <button id="dartBtn" class="btn active" type="button">Dart 40</button>
        <button id="blastBtn" class="btn" type="button">Blast 70</button>
        <button id="sniperBtn" class="btn" type="button">Sniper 95</button>
        <button id="newMapBtn" class="btn" type="button">New Map</button>
        <button id="restartBtn" class="btn" type="button">Restart</button>
      </div>
    </div>

    <canvas id="game" width="1000" height="560"></canvas>
    <p class="note"><b>How to play:</b> Place towers on grass, click a tower to upgrade it, press speed for faster rounds. Survive leaks.</p>

    <section class="meta-panel">
      <div class="meta-grid">
        <div>
          <span class="mini-label">Tower Skin</span>
          <select id="skinSelect" class="btn" aria-label="Tower skin"></select>
        </div>
        <div>
          <span class="mini-label">Progress</span>
          <div class="chips">
            <span class="chip">Best Wave: <b id="bestWaveOut">1</b></span>
            <span class="chip">Unlocked Skins: <b id="skinsOut">1</b></span>
          </div>
        </div>
      </div>
      <div>
        <span class="mini-label">Recent Runs</span>
        <table class="leaderboard" aria-label="Tower defense leaderboard">
          <thead>
            <tr><th>#</th><th>Wave</th><th>Seed</th><th>Mode</th><th>Lives Left</th></tr>
          </thead>
          <tbody id="leaderboardBody"></tbody>
        </table>
      </div>
    </section>
  </section>

  <script>
    (function () {
      var THEME_KEY = "gamehub_theme";
      var BEST_WAVE_KEY = "tds_redux_best_wave";
      var SKIN_KEY = "tds_redux_skin";
      var LEADERBOARD_KEY = "tds_redux_leaderboard";
      var canvas = document.getElementById("game");
      var ctx = canvas.getContext("2d");
      var coinsEl = document.getElementById("coins");
      var livesEl = document.getElementById("lives");
      var waveEl = document.getElementById("wave");
      var modeEl = document.getElementById("mode");
      var seedOutEl = document.getElementById("seedOut");
      var planOutEl = document.getElementById("planOut");
      var bestWaveEl = document.getElementById("bestWaveOut");
      var skinsEl = document.getElementById("skinsOut");
      var skinSelect = document.getElementById("skinSelect");
      var leaderboardBody = document.getElementById("leaderboardBody");
      var difficultySelect = document.getElementById("difficulty");
      var targetModeSelect = document.getElementById("targetMode");
      var speedBtn = document.getElementById("speedBtn");
      var dartBtn = document.getElementById("dartBtn");
      var blastBtn = document.getElementById("blastBtn");
      var sniperBtn = document.getElementById("sniperBtn");
      var newMapBtn = document.getElementById("newMapBtn");
      var restartBtn = document.getElementById("restartBtn");

      var W = canvas.width;
      var H = canvas.height;
      var TILE = 56;
      var GRID_X = 110;
      var GRID_Y = 32;
      var COLS = 14;
      var ROWS = 9;

      var DIFFICULTY = {
        rookie: { label: "Rookie", coins: 180, lives: 28, hpScale: 1.8, speedScale: 0.92, spawnBase: 22, waveDelay: 92 },
        normal: { label: "Normal", coins: 130, lives: 20, hpScale: 2.0, speedScale: 1.0, spawnBase: 18, waveDelay: 76 },
        hard: { label: "Hard", coins: 95, lives: 15, hpScale: 2.3, speedScale: 1.1, spawnBase: 14, waveDelay: 62 }
      };

      var palettes = {
        light: { bgA: "#eff6ff", bgB: "#dbeafe", ink: "#10294e", line: "rgba(28,64,124,0.2)", grass: "#c7e4b8", grass2: "#b5d79f", path: "#e8b77a" },
        gray: { bgA: "#222933", bgB: "#3d4655", ink: "#e6edf8", line: "rgba(178,194,216,0.24)", grass: "#5b6c5a", grass2: "#4e5f4d", path: "#8b7c64" },
        black: { bgA: "#0f141b", bgB: "#273142", ink: "#eef3ff", line: "rgba(190,205,232,0.26)", grass: "#4f644e", grass2: "#425643", path: "#8a765d" }
      };

      var state;
      var difficulty = "normal";
      var selectedTower = "dart";
      var targetMode = "first";
      var tickMultiplier = 1;
      var pathSeed = Math.floor(Math.random() * 1000000);
      var pathTiles = [];
      var enemyIdCounter = 1;
      var bestWave = Number(localStorage.getItem(BEST_WAVE_KEY) || "1");
      var skinId = localStorage.getItem(SKIN_KEY) || "classic";
      var leaderboard = [];

      try {
        leaderboard = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]");
        if (!Array.isArray(leaderboard)) leaderboard = [];
      } catch (error) {
        leaderboard = [];
      }

      var skins = {
        classic: {
          name: "Classic",
          unlockAt: 1,
          tower: { dart: "#0ea5e9", blast: "#fb7185", sniper: "#a855f7" },
          projectile: { dart: "#0ea5e9", blast: "#fb7185", sniper: "#a855f7" }
        },
        neon: {
          name: "Neon",
          unlockAt: 10,
          tower: { dart: "#67e8f9", blast: "#f97316", sniper: "#fde047" },
          projectile: { dart: "#67e8f9", blast: "#fb923c", sniper: "#fef08a" }
        },
        obsidian: {
          name: "Obsidian",
          unlockAt: 20,
          tower: { dart: "#94a3b8", blast: "#f43f5e", sniper: "#38bdf8" },
          projectile: { dart: "#cbd5e1", blast: "#fb7185", sniper: "#7dd3fc" }
        }
      };

      var BLOON_TYPES = {
        red: { hp: 14, speed: 1.15, value: 6, radius: 10, color: "#ef4444", children: [] },
        blue: { hp: 24, speed: 1.28, value: 10, radius: 10, color: "#3b82f6", children: ["red"] },
        green: { hp: 38, speed: 1.42, value: 14, radius: 11, color: "#22c55e", children: ["blue"] },
        yellow: { hp: 54, speed: 1.7, value: 18, radius: 11, color: "#f59e0b", children: ["green"] },
        black: { hp: 74, speed: 1.08, value: 26, radius: 12, color: "#7c3aed", children: ["yellow", "yellow"] }
      };

      function rng(seed) {
        var s = seed >>> 0;
        return function () {
          s = (s * 1664525 + 1013904223) >>> 0;
          return s / 4294967296;
        };
      }

      function readTheme() {
        var t = "light";
        try { t = localStorage.getItem(THEME_KEY) || "light"; } catch (error) { t = "light"; }
        return ["light", "gray", "black"].indexOf(t) === -1 ? "light" : t;
      }

      function applyTheme() {
        var p = palettes[readTheme()];
        document.documentElement.style.setProperty("--bg-a", p.bgA);
        document.documentElement.style.setProperty("--bg-b", p.bgB);
        document.documentElement.style.setProperty("--ink", p.ink);
        document.documentElement.style.setProperty("--line", p.line);
        document.documentElement.style.colorScheme = readTheme() === "black" ? "dark" : "light";
      }

      function tileCenter(col, row) {
        return { x: GRID_X + col * TILE + TILE / 2, y: GRID_Y + row * TILE + TILE / 2 };
      }

      function generatePath(seed) {
        var rand = rng(seed);
        var row = 3 + Math.floor(rand() * 3);
        var path = [];
        var col;
        for (col = 0; col < COLS; col++) {
          path.push([col, row]);
          var dir = rand();
          if (dir < 0.30) row -= 1;
          else if (dir > 0.70) row += 1;

          if (col > 1 && col < COLS - 2 && rand() < 0.16) {
            row += rand() < 0.5 ? -1 : 1;
          }
          row = Math.max(1, Math.min(ROWS - 2, row));
        }
        return path;
      }

      function isPath(col, row) {
        for (var i = 0; i < pathTiles.length; i++) {
          if (pathTiles[i][0] === col && pathTiles[i][1] === row) return true;
        }
        return false;
      }

      function towerAt(col, row) {
        return state.towers.find(function (t) { return t.col === col && t.row === row; });
      }

      function syncHud() {
        coinsEl.textContent = String(state.coins);
        livesEl.textContent = String(state.lives);
        waveEl.textContent = String(state.wave);
        modeEl.textContent = DIFFICULTY[difficulty].label;
        seedOutEl.textContent = String(pathSeed);
        planOutEl.textContent = state.roundLabel || "--";
        if (state.wave > bestWave) {
          bestWave = state.wave;
          localStorage.setItem(BEST_WAVE_KEY, String(bestWave));
        }
        bestWaveEl.textContent = String(bestWave);
      }

      function buildRoundRecipe(wave) {
        var red = Math.max(0, 10 - Math.floor(wave / 2));
        var blue = 3 + Math.floor(wave * 1.25);
        var green = wave >= 4 ? Math.floor((wave - 2) * 0.95) : 0;
        var yellow = wave >= 9 ? Math.floor((wave - 7) * 0.8) : 0;
        var black = wave >= 15 ? Math.floor((wave - 13) * 0.65) : 0;

        if (wave % 5 === 0) {
          yellow += 2;
          black += 1;
        }
        if (wave % 9 === 0) {
          black += 2;
          green += 3;
        }

        return [
          { type: "red", count: red },
          { type: "blue", count: blue },
          { type: "green", count: green },
          { type: "yellow", count: yellow },
          { type: "black", count: black }
        ].filter(function (r) { return r.count > 0; });
      }

      function roundLabelFromRecipe(recipe) {
        return recipe.map(function (r) {
          return r.type.charAt(0).toUpperCase() + r.type.slice(1) + " x" + r.count;
        }).join(" · ");
      }

      function makeSpawnSpec(typeName, wave) {
        var base = BLOON_TYPES[typeName];
        var cfg = DIFFICULTY[difficulty];
        return {
          type: typeName,
          hp: Math.round(base.hp + wave * cfg.hpScale * 1.8),
          speed: base.speed * cfg.speedScale * (1 + wave * 0.008),
          value: base.value + Math.floor(wave * 0.35)
        };
      }

      function unlockedSkinIds() {
        return Object.keys(skins).filter(function (id) {
          return bestWave >= skins[id].unlockAt;
        });
      }

      function ensureSkinUnlocked() {
        var unlocked = unlockedSkinIds();
        if (unlocked.indexOf(skinId) === -1) skinId = unlocked[0] || "classic";
        localStorage.setItem(SKIN_KEY, skinId);
      }

      function saveLeaderboard() {
        localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(leaderboard));
      }

      function syncMetaUi() {
        var unlocked = unlockedSkinIds();
        skinsEl.textContent = String(unlocked.length);
        bestWaveEl.textContent = String(bestWave);

        skinSelect.innerHTML = "";
        unlocked.forEach(function (id) {
          var opt = document.createElement("option");
          opt.value = id;
          opt.textContent = skins[id].name;
          skinSelect.appendChild(opt);
        });

        ensureSkinUnlocked();
        skinSelect.value = skinId;

        leaderboardBody.innerHTML = "";
        if (!leaderboard.length) {
          var empty = document.createElement("tr");
          empty.innerHTML = "<td colspan=\"5\">No runs recorded yet.</td>";
          leaderboardBody.appendChild(empty);
          return;
        }

        leaderboard.forEach(function (entry, idx) {
          var tr = document.createElement("tr");
          tr.innerHTML = "<td>" + (idx + 1) + "</td>" +
            "<td>" + entry.wave + "</td>" +
            "<td>" + entry.seed + "</td>" +
            "<td>" + entry.mode + "</td>" +
            "<td>" + entry.lives + "</td>";
          leaderboardBody.appendChild(tr);
        });
      }

      function recordRun() {
        if (!state || state.resultRecorded) return;
        state.resultRecorded = true;
        leaderboard.push({
          wave: state.wave,
          seed: pathSeed,
          mode: DIFFICULTY[difficulty].label,
          lives: Math.max(0, state.lives)
        });

        leaderboard.sort(function (a, b) {
          if (a.wave !== b.wave) return b.wave - a.wave;
          return b.lives - a.lives;
        });
        leaderboard = leaderboard.slice(0, 12);
        saveLeaderboard();
        syncMetaUi();
      }

      function setTowerButtons() {
        dartBtn.classList.toggle("active", selectedTower === "dart");
        blastBtn.classList.toggle("active", selectedTower === "blast");
        sniperBtn.classList.toggle("active", selectedTower === "sniper");
      }

      function buildWave() {
        var cfg = DIFFICULTY[difficulty];
        var wave = state.wave;
        var q = [];
        var recipe = buildRoundRecipe(wave);
        var r;
        for (r = 0; r < recipe.length; r++) {
          for (var i = 0; i < recipe[r].count; i++) {
            q.push(makeSpawnSpec(recipe[r].type, wave));
          }
        }

        var localRand = rng(pathSeed + wave * 1877);
        for (var k = q.length - 1; k > 0; k--) {
          var j = Math.floor(localRand() * (k + 1));
          var tmp = q[k]; q[k] = q[j]; q[j] = tmp;
        }

        state.spawnQueue = q;
        state.roundLabel = roundLabelFromRecipe(recipe);
        state.spawnDelay = Math.max(8, cfg.spawnBase - Math.floor(wave * 0.45));
        syncHud();
      }

      function spawnEnemy(spec) {
        var s = tileCenter(pathTiles[0][0], pathTiles[0][1]);
        var base = BLOON_TYPES[spec.type] || BLOON_TYPES.red;
        state.enemies.push({
          id: enemyIdCounter++,
          x: s.x,
          y: s.y,
          hp: spec.hp,
          maxHp: spec.hp,
          speed: spec.speed,
          value: spec.value,
          kind: spec.type,
          seg: 0,
          progress: 0,
          radius: base.radius,
          color: base.color
        });
      }

      function spawnChildren(enemy) {
        var base = BLOON_TYPES[enemy.kind];
        if (!base || !base.children || !base.children.length) return;

        for (var i = 0; i < base.children.length; i++) {
          var cType = base.children[i];
          var cBase = BLOON_TYPES[cType];
          state.enemies.push({
            id: enemyIdCounter++,
            x: enemy.x + (i === 0 ? -4 : 4),
            y: enemy.y,
            hp: Math.max(1, Math.round(cBase.hp * 0.85 + state.wave * 0.7)),
            maxHp: Math.max(1, Math.round(cBase.hp * 0.85 + state.wave * 0.7)),
            speed: cBase.speed * DIFFICULTY[difficulty].speedScale * 1.06,
            value: Math.max(1, Math.round(cBase.value * 0.75)),
            kind: cType,
            seg: enemy.seg,
            progress: enemy.progress,
            radius: cBase.radius,
            color: cBase.color
          });
        }
      }

      function resetGame(newSeed) {
        var cfg = DIFFICULTY[difficulty];
        if (newSeed) pathSeed = Math.floor(Math.random() * 1000000);
        pathTiles = generatePath(pathSeed);
        state = {
          t: 0,
          coins: cfg.coins,
          lives: cfg.lives,
          wave: 1,
          spawnQueue: [],
          spawnDelay: 0,
          betweenWaves: cfg.waveDelay,
          towers: [],
          enemies: [],
          projectiles: [],
          gameOver: false,
          resultRecorded: false,
          roundLabel: ""
        };
        tickMultiplier = 1;
        speedBtn.textContent = "Speed 1x";
        buildWave();
        syncHud();
        syncMetaUi();
      }

      function advanceWaves() {
        if (state.gameOver) return;
        var cfg = DIFFICULTY[difficulty];

        if (state.spawnQueue.length > 0) {
          state.spawnDelay -= 1;
          if (state.spawnDelay <= 0) {
            spawnEnemy(state.spawnQueue.shift());
            state.spawnDelay = Math.max(7, cfg.spawnBase + Math.floor(Math.random() * 11) - Math.floor(state.wave * 0.35));
          }
          return;
        }

        if (state.enemies.length === 0) {
          state.betweenWaves -= 1;
          if (state.betweenWaves <= 0) {
            state.coins += 12 + Math.floor(state.wave * 1.8);
            state.wave += 1;
            state.betweenWaves = cfg.waveDelay;
            buildWave();
            syncHud();
          }
        }
      }

      function updateEnemies() {
        for (var i = state.enemies.length - 1; i >= 0; i--) {
          var e = state.enemies[i];
          var ns = Math.min(e.seg + 1, pathTiles.length - 1);
          var target = tileCenter(pathTiles[ns][0], pathTiles[ns][1]);
          var dx = target.x - e.x;
          var dy = target.y - e.y;
          var d = Math.hypot(dx, dy) || 1;

          if (d < e.speed + 0.5) {
            e.seg = ns;
          } else {
            e.x += (dx / d) * e.speed;
            e.y += (dy / d) * e.speed;
          }
          e.progress = e.seg + (1 - Math.min(1, d / TILE));

          if (e.seg >= pathTiles.length - 1 && Math.abs(e.x - target.x) < 3 && Math.abs(e.y - target.y) < 3) {
            state.enemies.splice(i, 1);
            state.lives -= 1;
            syncHud();
            if (state.lives <= 0) {
              state.gameOver = true;
              recordRun();
            }
            continue;
          }

          if (e.hp <= 0) {
            state.enemies.splice(i, 1);
            state.coins += e.value;
            spawnChildren(e);
            syncHud();
          }
        }
      }

      function chooseTarget(tower, center) {
        var chosen = null;
        var best = targetMode === "last" ? Infinity : -Infinity;
        var bestDist = Infinity;

        for (var i = 0; i < state.enemies.length; i++) {
          var e = state.enemies[i];
          var dist = Math.hypot(e.x - center.x, e.y - center.y);
          if (dist > tower.range) continue;

          if (targetMode === "close") {
            if (dist < bestDist) {
              bestDist = dist;
              chosen = e;
            }
            continue;
          }

          var score;
          if (targetMode === "strong") score = e.maxHp;
          else if (targetMode === "last") score = e.progress;
          else score = e.progress;

          if (targetMode === "last") {
            if (score < best) {
              best = score;
              chosen = e;
            }
          } else if (score > best) {
            best = score;
            chosen = e;
          }
        }

        return chosen;
      }

      function nextPierceTarget(sourceX, sourceY, currentId) {
        var nearest = null;
        var nearestDist = Infinity;
        for (var i = 0; i < state.enemies.length; i++) {
          var e = state.enemies[i];
          if (e.id === currentId || e.hp <= 0) continue;
          var dist = Math.hypot(e.x - sourceX, e.y - sourceY);
          if (dist < nearestDist && dist <= 120) {
            nearestDist = dist;
            nearest = e;
          }
        }
        return nearest;
      }

      function updateTowers() {
        state.towers.forEach(function (t) {
          t.cooldown -= 1;
          if (t.cooldown > 0) return;

          var c = tileCenter(t.col, t.row);
          var chosen = chooseTarget(t, c);

          if (!chosen) return;

          t.cooldown = t.fireRate;
          state.projectiles.push({
            x: c.x,
            y: c.y,
            tx: chosen,
            speed: t.projectileSpeed,
            damage: t.damage,
            splash: t.kind === "blast" ? 36 : 0,
            pierce: t.pierce,
            color: (skins[skinId] || skins.classic).projectile[t.kind]
          });
        });
      }

      function updateProjectiles() {
        for (var i = state.projectiles.length - 1; i >= 0; i--) {
          var p = state.projectiles[i];
          if (!p.tx || p.tx.hp <= 0) {
            state.projectiles.splice(i, 1);
            continue;
          }

          var dx = p.tx.x - p.x;
          var dy = p.tx.y - p.y;
          var d = Math.hypot(dx, dy) || 1;
          p.x += (dx / d) * p.speed;
          p.y += (dy / d) * p.speed;

          if (d < p.speed + 2) {
            if (p.splash > 0) {
              for (var j = 0; j < state.enemies.length; j++) {
                var e = state.enemies[j];
                if (Math.hypot(e.x - p.tx.x, e.y - p.tx.y) <= p.splash) {
                  e.hp -= p.damage;
                }
              }
              state.projectiles.splice(i, 1);
            } else {
              p.tx.hp -= p.damage;
              p.pierce -= 1;
              if (p.pierce > 0) {
                var chained = nextPierceTarget(p.tx.x, p.tx.y, p.tx.id);
                if (chained) {
                  p.tx = chained;
                  continue;
                }
              }
              state.projectiles.splice(i, 1);
            }
          }
        }
      }

      function update() {
        for (var k = 0; k < tickMultiplier; k++) {
          state.t += 1;
          advanceWaves();
          updateEnemies();
          updateTowers();
          updateProjectiles();
          if (state.gameOver) break;
        }
      }

      function drawGrid() {
        var p = palettes[readTheme()];
        var bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, p.bgB);
        bg.addColorStop(1, p.bgA);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        for (var c = 0; c < COLS; c++) {
          for (var r = 0; r < ROWS; r++) {
            var x = GRID_X + c * TILE;
            var y = GRID_Y + r * TILE;
            ctx.fillStyle = isPath(c, r) ? p.path : ((c + r) % 2 ? p.grass : p.grass2);
            ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
          }
        }
      }

      function drawTowers() {
        state.towers.forEach(function (t) {
          var c = tileCenter(t.col, t.row);
          ctx.fillStyle = (skins[skinId] || skins.classic).tower[t.kind];
          ctx.beginPath();
          ctx.arc(c.x, c.y, 16, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#0f172a";
          ctx.font = "700 12px Trebuchet MS, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(String(t.level), c.x, c.y + 4);
        });
      }

      function drawEnemies() {
        state.enemies.forEach(function (e) {
          ctx.fillStyle = e.color;
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
          ctx.fill();
          var ratio = Math.max(0, e.hp / e.maxHp);
          var barW = e.radius * 2 + 4;
          ctx.fillStyle = "rgba(15,23,42,0.45)";
          ctx.fillRect(e.x - barW / 2, e.y - (e.radius + 8), barW, 4);
          ctx.fillStyle = "#22c55e";
          ctx.fillRect(e.x - barW / 2, e.y - (e.radius + 8), barW * ratio, 4);
        });
      }

      function drawProjectiles() {
        state.projectiles.forEach(function (p) {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.splash > 0 ? 5 : 4, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawOverlay() {
        if (!state.gameOver) return;
        ctx.fillStyle = "rgba(2,6,23,0.62)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "800 42px Trebuchet MS, sans-serif";
        ctx.fillText("Game Over", W / 2, H / 2 - 10);
        ctx.font = "700 20px Trebuchet MS, sans-serif";
        ctx.fillText("Try a new map or lower difficulty", W / 2, H / 2 + 24);
      }

      function draw() {
        drawGrid();
        drawTowers();
        drawEnemies();
        drawProjectiles();
        drawOverlay();
      }

      function frame() {
        update();
        draw();
        requestAnimationFrame(frame);
      }

      function placeTower(col, row) {
        if (state.gameOver || isPath(col, row) || towerAt(col, row)) return;

        var def = {
          dart: { cost: 40, range: 172, damage: 8, fireRate: 24, pierce: 2, projectileSpeed: 7.2 },
          blast: { cost: 70, range: 124, damage: 16, fireRate: 46, pierce: 1, projectileSpeed: 5.4 },
          sniper: { cost: 95, range: 400, damage: 20, fireRate: 58, pierce: 3, projectileSpeed: 10.5 }
        }[selectedTower];

        if (!def || state.coins < def.cost) return;

        state.coins -= def.cost;
        state.towers.push({
          col: col,
          row: row,
          kind: selectedTower,
          level: 1,
          range: def.range,
          damage: def.damage,
          fireRate: def.fireRate,
          pierce: def.pierce,
          projectileSpeed: def.projectileSpeed,
          cooldown: 8
        });
        syncHud();
      }

      function upgradeTower(t) {
        var cost = 22 + (t.level - 1) * 14;
        if (state.coins < cost || t.level >= 5) return;
        state.coins -= cost;
        t.level += 1;
        if (t.kind === "blast") {
          t.damage += 7;
          t.range += 8;
          t.pierce = Math.min(3, t.pierce + 1);
          t.fireRate = Math.max(24, t.fireRate - 2);
        } else if (t.kind === "sniper") {
          t.damage += 10;
          t.range += 14;
          t.pierce = Math.min(7, t.pierce + 1);
          t.fireRate = Math.max(30, t.fireRate - 3);
        } else {
          t.damage += 3;
          t.range += 10;
          t.pierce = Math.min(6, t.pierce + 1);
          t.fireRate = Math.max(12, t.fireRate - 2);
        }
        syncHud();
      }

      canvas.addEventListener("pointerdown", function (event) {
        var rect = canvas.getBoundingClientRect();
        var sx = canvas.width / rect.width;
        var sy = canvas.height / rect.height;
        var x = (event.clientX - rect.left) * sx;
        var y = (event.clientY - rect.top) * sy;

        var col = Math.floor((x - GRID_X) / TILE);
        var row = Math.floor((y - GRID_Y) / TILE);
        if (col < 0 || row < 0 || col >= COLS || row >= ROWS) return;

        var t = towerAt(col, row);
        if (t) upgradeTower(t);
        else placeTower(col, row);
      });

      difficultySelect.addEventListener("change", function () {
        var val = difficultySelect.value;
        difficulty = Object.prototype.hasOwnProperty.call(DIFFICULTY, val) ? val : "normal";
        resetGame(false);
      });

      targetModeSelect.addEventListener("change", function () {
        targetMode = targetModeSelect.value;
      });

      skinSelect.addEventListener("change", function () {
        skinId = skinSelect.value;
        ensureSkinUnlocked();
        syncMetaUi();
      });

      speedBtn.addEventListener("click", function () {
        tickMultiplier = tickMultiplier === 1 ? 2 : (tickMultiplier === 2 ? 3 : 1);
        speedBtn.textContent = "Speed " + tickMultiplier + "x";
      });

      dartBtn.addEventListener("click", function () { selectedTower = "dart"; setTowerButtons(); });
      blastBtn.addEventListener("click", function () { selectedTower = "blast"; setTowerButtons(); });
      sniperBtn.addEventListener("click", function () { selectedTower = "sniper"; setTowerButtons(); });
      newMapBtn.addEventListener("click", function () { resetGame(true); });
      restartBtn.addEventListener("click", function () { resetGame(false); });

      applyTheme();
      window.addEventListener("focus", applyTheme);
      window.addEventListener("storage", function (event) {
        if (event.key === THEME_KEY) applyTheme();
      });
      ensureSkinUnlocked();
      syncMetaUi();
      setTowerButtons();
      resetGame(false);
      frame();
    })();
  </script>
</body>
</html>
