<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tower Defense Grid</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --ink: #e5e7eb;
      --accent: #22d3ee;
      --ok: #34d399;
      --warn: #fb7185;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background: radial-gradient(circle at 10% -20%, #1f2f52 0, transparent 40%), linear-gradient(180deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 14px;
    }
    .shell {
      width: min(980px, 96vw);
      display: grid;
      gap: 10px;
    }
    .hud {
      border: 1px solid rgba(148, 163, 184, 0.32);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.55);
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      padding: 5px 9px;
      background: rgba(30, 41, 59, 0.6);
      font-size: 0.82rem;
      font-weight: 700;
    }
    .chip strong { color: #fff; }
    .btn {
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-radius: 10px;
      background: rgba(30, 41, 59, 0.75);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      padding: 7px 10px;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--accent); color: #fff; }
    canvas {
      width: 100%;
      height: auto;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 16px;
      background: #0b1326;
      box-shadow: 0 12px 24px rgba(2, 8, 23, 0.45);
      image-rendering: auto;
    }
    .note {
      margin: 0;
      color: #b9c5da;
      font-size: 0.86rem;
    }
    .note b { color: #fff; }
  </style>
</head>
<body>
  <section class="shell">
    <div class="hud">
      <div class="chips">
        <span class="chip">Coins: <strong id="coins">120</strong></span>
        <span class="chip">Lives: <strong id="lives">20</strong></span>
        <span class="chip">Wave: <strong id="wave">1</strong></span>
      </div>
      <button id="restartBtn" class="btn" type="button">Restart</button>
    </div>
    <canvas id="game" width="960" height="480" aria-label="Tower Defense Grid"></canvas>
    <p class="note"><b>How to play:</b> Click empty tiles to place towers (cost 40). Towers auto-fire. Survive as many waves as possible.</p>
  </section>

  <script>
    (function () {
      var canvas = document.getElementById("game");
      var ctx = canvas.getContext("2d");
      var coinsEl = document.getElementById("coins");
      var livesEl = document.getElementById("lives");
      var waveEl = document.getElementById("wave");
      var restartBtn = document.getElementById("restartBtn");

      var COLS = 12;
      var ROWS = 7;
      var TILE = 64;
      var GRID_X = 96;
      var GRID_Y = 20;

      var pathRows = [3, 3, 3, 3, 3, 3, 3, 3, 2, 2, 2, 2];

      var state;

      function reset() {
        state = {
          t: 0,
          coins: 120,
          lives: 20,
          wave: 1,
          waveTimer: 40,
          enemiesLeftToSpawn: 9,
          spawnDelay: 0,
          towers: [],
          enemies: [],
          projectiles: [],
          gameOver: false
        };
        syncHud();
      }

      function syncHud() {
        coinsEl.textContent = String(state.coins);
        livesEl.textContent = String(state.lives);
        waveEl.textContent = String(state.wave);
      }

      function tileCenter(col, row) {
        return {
          x: GRID_X + col * TILE + TILE / 2,
          y: GRID_Y + row * TILE + TILE / 2
        };
      }

      function pathPoint(col) {
        return tileCenter(col, pathRows[col]);
      }

      function isPath(col, row) {
        return pathRows[col] === row;
      }

      function towerAt(col, row) {
        return state.towers.find(function (t) { return t.col === col && t.row === row; });
      }

      function spawnEnemy() {
        var p0 = pathPoint(0);
        var hpBase = 10 + state.wave * 3;
        state.enemies.push({
          x: p0.x,
          y: p0.y,
          hp: hpBase,
          maxHp: hpBase,
          speed: 1 + state.wave * 0.05,
          segment: 0
        });
      }

      function beginNextWave() {
        state.wave += 1;
        state.enemiesLeftToSpawn = 7 + state.wave * 2;
        state.waveTimer = 140;
        syncHud();
      }

      function updateEnemies() {
        for (var i = state.enemies.length - 1; i >= 0; i--) {
          var e = state.enemies[i];
          var nextSeg = Math.min(e.segment + 1, COLS - 1);
          var target = pathPoint(nextSeg);
          var dx = target.x - e.x;
          var dy = target.y - e.y;
          var dist = Math.hypot(dx, dy) || 1;

          if (dist < e.speed + 0.6) {
            e.segment = nextSeg;
          } else {
            e.x += (dx / dist) * e.speed;
            e.y += (dy / dist) * e.speed;
          }

          if (e.segment >= COLS - 1 && Math.abs(e.x - target.x) < 3 && Math.abs(e.y - target.y) < 3) {
            state.enemies.splice(i, 1);
            state.lives -= 1;
            syncHud();
            if (state.lives <= 0) {
              state.gameOver = true;
            }
            continue;
          }

          if (e.hp <= 0) {
            state.enemies.splice(i, 1);
            state.coins += 10;
            syncHud();
          }
        }
      }

      function updateTowers() {
        state.towers.forEach(function (tower) {
          tower.cooldown -= 1;
          if (tower.cooldown > 0) return;

          var cx = GRID_X + tower.col * TILE + TILE / 2;
          var cy = GRID_Y + tower.row * TILE + TILE / 2;
          var target = null;
          var bestProgress = -1;

          for (var i = 0; i < state.enemies.length; i++) {
            var e = state.enemies[i];
            var d = Math.hypot(e.x - cx, e.y - cy);
            if (d > tower.range) continue;
            var progress = e.segment + (e.hp <= 0 ? 0 : 0.001);
            if (progress > bestProgress) {
              bestProgress = progress;
              target = e;
            }
          }

          if (target) {
            tower.cooldown = tower.fireRate;
            state.projectiles.push({
              x: cx,
              y: cy,
              tx: target,
              speed: 6,
              damage: tower.damage
            });
          }
        });
      }

      function updateProjectiles() {
        for (var i = state.projectiles.length - 1; i >= 0; i--) {
          var p = state.projectiles[i];
          if (!p.tx || p.tx.hp <= 0) {
            state.projectiles.splice(i, 1);
            continue;
          }

          var dx = p.tx.x - p.x;
          var dy = p.tx.y - p.y;
          var dist = Math.hypot(dx, dy) || 1;
          p.x += (dx / dist) * p.speed;
          p.y += (dy / dist) * p.speed;

          if (dist < p.speed + 2) {
            p.tx.hp -= p.damage;
            state.projectiles.splice(i, 1);
          }
        }
      }

      function updateWaves() {
        if (state.gameOver) return;
        if (state.enemiesLeftToSpawn > 0) {
          state.spawnDelay -= 1;
          if (state.spawnDelay <= 0) {
            spawnEnemy();
            state.enemiesLeftToSpawn -= 1;
            state.spawnDelay = Math.max(16, 48 - state.wave * 2);
          }
          return;
        }

        if (state.enemies.length === 0) {
          state.waveTimer -= 1;
          if (state.waveTimer <= 0) {
            beginNextWave();
          }
        }
      }

      function update() {
        state.t += 1;
        updateWaves();
        updateEnemies();
        updateTowers();
        updateProjectiles();
      }

      function drawGrid() {
        ctx.fillStyle = "#0b1326";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (var c = 0; c < COLS; c++) {
          for (var r = 0; r < ROWS; r++) {
            var x = GRID_X + c * TILE;
            var y = GRID_Y + r * TILE;
            var path = isPath(c, r);
            ctx.fillStyle = path ? "#2b3f63" : "#15223a";
            ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
          }
        }
      }

      function drawTowers() {
        state.towers.forEach(function (t) {
          var cx = GRID_X + t.col * TILE + TILE / 2;
          var cy = GRID_Y + t.row * TILE + TILE / 2;
          ctx.fillStyle = "#22d3ee";
          ctx.beginPath();
          ctx.arc(cx, cy, 16, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#0e7490";
          ctx.fillRect(cx - 4, cy - 22, 8, 18);
        });
      }

      function drawEnemies() {
        state.enemies.forEach(function (e) {
          ctx.fillStyle = "#fb7185";
          ctx.beginPath();
          ctx.arc(e.x, e.y, 13, 0, Math.PI * 2);
          ctx.fill();

          var ratio = Math.max(0, e.hp / e.maxHp);
          ctx.fillStyle = "#0f172a";
          ctx.fillRect(e.x - 16, e.y - 20, 32, 4);
          ctx.fillStyle = "#34d399";
          ctx.fillRect(e.x - 16, e.y - 20, 32 * ratio, 4);
        });
      }

      function drawProjectiles() {
        ctx.fillStyle = "#fef08a";
        state.projectiles.forEach(function (p) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawOverlay() {
        if (!state.gameOver) return;
        ctx.fillStyle = "rgba(2, 6, 23, 0.66)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "800 42px Trebuchet MS, sans-serif";
        ctx.fillText("Defenses Breached", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "700 20px Trebuchet MS, sans-serif";
        ctx.fillText("Press R or Restart", canvas.width / 2, canvas.height / 2 + 20);
      }

      function draw() {
        drawGrid();
        drawTowers();
        drawEnemies();
        drawProjectiles();
        drawOverlay();
      }

      function frame() {
        update();
        draw();
        requestAnimationFrame(frame);
      }

      canvas.addEventListener("pointerdown", function (event) {
        var rect = canvas.getBoundingClientRect();
        var scaleX = canvas.width / rect.width;
        var scaleY = canvas.height / rect.height;
        var x = (event.clientX - rect.left) * scaleX;
        var y = (event.clientY - rect.top) * scaleY;

        var col = Math.floor((x - GRID_X) / TILE);
        var row = Math.floor((y - GRID_Y) / TILE);

        if (state.gameOver) {
          reset();
          return;
        }

        if (col < 0 || row < 0 || col >= COLS || row >= ROWS) return;
        if (isPath(col, row)) return;
        if (towerAt(col, row)) return;
        if (state.coins < 40) return;

        state.coins -= 40;
        state.towers.push({
          col: col,
          row: row,
          range: 160,
          damage: 6,
          fireRate: 28,
          cooldown: 6
        });
        syncHud();
      });

      document.addEventListener("keydown", function (event) {
        if ((event.key || "").toLowerCase() === "r") {
          reset();
        }
      });

      restartBtn.addEventListener("click", reset);

      reset();
      frame();
    })();
  </script>
</body>
</html>
