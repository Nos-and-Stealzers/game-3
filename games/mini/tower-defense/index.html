<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Campus Tower Defense</title>
  <style>
    :root {
      --bg-a: #eff6ff;
      --bg-b: #dbeafe;
      --ink: #10294e;
      --panel: rgba(255, 255, 255, 0.82);
      --line: rgba(28, 64, 124, 0.2);
      --accent: #0f6fff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 8% -12%, var(--bg-b), transparent 42%), linear-gradient(180deg, var(--bg-a), #f8fbff);
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .shell {
      width: min(980px, 96vw);
      display: grid;
      gap: 10px;
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 10px 12px;
      backdrop-filter: blur(4px);
    }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 5px 10px;
      font-size: 0.82rem;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.6);
    }

    .tools { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.74);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      padding: 7px 10px;
      cursor: pointer;
    }
    .btn.active { border-color: var(--accent); color: var(--accent); }

    canvas {
      width: 100%;
      height: auto;
      border-radius: 14px;
      border: 1px solid var(--line);
      box-shadow: 0 12px 24px rgba(16, 41, 78, 0.18);
      background: #dcecff;
    }

    .note {
      margin: 0;
      font-size: 0.86rem;
      color: color-mix(in srgb, var(--ink) 72%, white);
    }

    .note b { color: var(--ink); }
  </style>
</head>
<body>
  <section class="shell">
    <div class="hud">
      <div class="chips">
        <span class="chip">Coins: <b id="coins">120</b></span>
        <span class="chip">Lives: <b id="lives">20</b></span>
        <span class="chip">Wave: <b id="wave">1</b></span>
        <span class="chip">Mode: <b id="modeLabel">Normal</b></span>
      </div>
      <div class="tools">
        <select id="difficulty" class="btn" aria-label="Difficulty">
          <option value="rookie">Rookie</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
        <button id="speedBtn" class="btn" type="button">Speed 1x</button>
        <button id="dartBtn" class="btn active" type="button">Dart (40)</button>
        <button id="blastBtn" class="btn" type="button">Blast (70)</button>
        <button id="restartBtn" class="btn" type="button">Restart</button>
      </div>
    </div>

    <canvas id="game" width="960" height="540"></canvas>
    <p class="note"><b>How to play:</b> Pick a tower type, click empty grass to place. Click placed towers to upgrade (+20). Stop all leaks.</p>
  </section>

  <script>
    (function () {
      var THEME_KEY = "gamehub_theme";
      var canvas = document.getElementById("game");
      var ctx = canvas.getContext("2d");
      var coinsEl = document.getElementById("coins");
      var livesEl = document.getElementById("lives");
      var waveEl = document.getElementById("wave");
      var modeLabelEl = document.getElementById("modeLabel");
      var difficultySelect = document.getElementById("difficulty");
      var speedBtn = document.getElementById("speedBtn");
      var dartBtn = document.getElementById("dartBtn");
      var blastBtn = document.getElementById("blastBtn");
      var restartBtn = document.getElementById("restartBtn");

      var W = canvas.width;
      var H = canvas.height;
      var TILE = 60;
      var GRID_X = 120;
      var GRID_Y = 30;
      var COLS = 12;
      var ROWS = 8;

      var path = [
        [0, 6], [1, 6], [2, 6], [3, 6], [3, 5], [3, 4], [4, 4], [5, 4], [6, 4],
        [6, 5], [6, 6], [7, 6], [8, 6], [9, 6], [10, 6], [11, 6]
      ];

      var palettes = {
        light: {
          bgA: "#eff6ff", bgB: "#dbeafe", ink: "#10294e", line: "rgba(28,64,124,0.2)",
          grass: "#c6e4b7", grass2: "#b8dca6", path: "#eab97b", path2: "#d79f5f"
        },
        gray: {
          bgA: "#222933", bgB: "#3d4655", ink: "#e6edf8", line: "rgba(178,194,216,0.24)",
          grass: "#5b6c5a", grass2: "#4f5d4f", path: "#8a7a63", path2: "#766750"
        },
        black: {
          bgA: "#0f141b", bgB: "#263041", ink: "#eef3ff", line: "rgba(190,205,232,0.26)",
          grass: "#4f644e", grass2: "#435742", path: "#8a765d", path2: "#735f47"
        }
      };

      function readTheme() {
        var v = "light";
        try { v = localStorage.getItem(THEME_KEY) || "light"; } catch (error) { v = "light"; }
        return ["light", "gray", "black"].indexOf(v) === -1 ? "light" : v;
      }

      function applyTheme() {
        var theme = readTheme();
        var p = palettes[theme];
        document.body.setAttribute("data-theme", theme);
        document.documentElement.style.colorScheme = theme === "black" ? "dark" : "light";
        document.documentElement.style.setProperty("--bg-a", p.bgA);
        document.documentElement.style.setProperty("--bg-b", p.bgB);
        document.documentElement.style.setProperty("--ink", p.ink);
        document.documentElement.style.setProperty("--line", p.line);
      }

      var state;
      var selectedType = "dart";
      var difficulty = "normal";
      var tickMultiplier = 1;

      var DIFFICULTY = {
        rookie: {
          label: "Rookie",
          coins: 170,
          lives: 26,
          runnerHp: 10,
          tankHp: 32,
          swiftHp: 8,
          hpScale: 1.9,
          speedScale: 0.94,
          spawnBase: 24,
          waveDelay: 92
        },
        normal: {
          label: "Normal",
          coins: 120,
          lives: 20,
          runnerHp: 12,
          tankHp: 38,
          swiftHp: 9,
          hpScale: 2.0,
          speedScale: 1,
          spawnBase: 18,
          waveDelay: 75
        },
        hard: {
          label: "Hard",
          coins: 95,
          lives: 16,
          runnerHp: 14,
          tankHp: 44,
          swiftHp: 10,
          hpScale: 2.3,
          speedScale: 1.08,
          spawnBase: 14,
          waveDelay: 62
        }
      };

      function tileCenter(col, row) {
        return { x: GRID_X + col * TILE + TILE / 2, y: GRID_Y + row * TILE + TILE / 2 };
      }

      function isPath(col, row) {
        for (var i = 0; i < path.length; i++) {
          if (path[i][0] === col && path[i][1] === row) return true;
        }
        return false;
      }

      function towerAt(col, row) {
        return state.towers.find(function (t) { return t.col === col && t.row === row; });
      }

      function syncHud() {
        coinsEl.textContent = String(state.coins);
        livesEl.textContent = String(state.lives);
        waveEl.textContent = String(state.wave);
        modeLabelEl.textContent = DIFFICULTY[difficulty].label;
      }

      function reset() {
        var cfg = DIFFICULTY[difficulty];
        state = {
          t: 0,
          coins: cfg.coins,
          lives: cfg.lives,
          wave: 1,
          spawnQueue: [],
          spawnDelay: 0,
          betweenWaves: cfg.waveDelay,
          towers: [],
          enemies: [],
          projectiles: [],
          gameOver: false
        };
        selectedType = "dart";
        dartBtn.classList.add("active");
        blastBtn.classList.remove("active");
        buildWave(state.wave);
        syncHud();
      }

      function buildWave(wave) {
        var cfg = DIFFICULTY[difficulty];
        var queue = [];
        var i;
        for (i = 0; i < 6 + wave; i++) {
          queue.push({ type: "runner", hp: cfg.runnerHp + wave * cfg.hpScale, speed: (1.3 + wave * 0.04) * cfg.speedScale, value: 9 });
        }
        for (i = 0; i < Math.floor(wave / 2); i++) {
          queue.push({ type: "tank", hp: cfg.tankHp + wave * (cfg.hpScale * 2.5), speed: (0.7 + wave * 0.03) * cfg.speedScale, value: 18 });
        }
        for (i = 0; i < Math.floor((wave + 1) / 3); i++) {
          queue.push({ type: "swift", hp: cfg.swiftHp + wave * cfg.hpScale, speed: (1.85 + wave * 0.05) * cfg.speedScale, value: 11 });
        }

        for (i = queue.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = queue[i];
          queue[i] = queue[j];
          queue[j] = tmp;
        }

        state.spawnQueue = queue;
      }

      function spawnEnemy(spec) {
        var start = tileCenter(path[0][0], path[0][1]);
        state.enemies.push({
          x: start.x,
          y: start.y,
          hp: spec.hp,
          maxHp: spec.hp,
          speed: spec.speed,
          value: spec.value,
          kind: spec.type,
          seg: 0
        });
      }

      function advanceWaves() {
        if (state.gameOver) return;
        var cfg = DIFFICULTY[difficulty];

        if (state.spawnQueue.length > 0) {
          state.spawnDelay -= 1;
          if (state.spawnDelay <= 0) {
            spawnEnemy(state.spawnQueue.shift());
            state.spawnDelay = cfg.spawnBase + Math.floor(Math.random() * 14);
          }
          return;
        }

        if (state.enemies.length === 0) {
          state.betweenWaves -= 1;
          if (state.betweenWaves <= 0) {
            state.wave += 1;
            state.betweenWaves = cfg.waveDelay;
            buildWave(state.wave);
            syncHud();
          }
        }
      }

      function updateEnemies() {
        for (var i = state.enemies.length - 1; i >= 0; i--) {
          var e = state.enemies[i];
          var targetSeg = Math.min(e.seg + 1, path.length - 1);
          var target = tileCenter(path[targetSeg][0], path[targetSeg][1]);
          var dx = target.x - e.x;
          var dy = target.y - e.y;
          var d = Math.hypot(dx, dy) || 1;

          if (d < e.speed + 0.5) {
            e.seg = targetSeg;
          } else {
            e.x += (dx / d) * e.speed;
            e.y += (dy / d) * e.speed;
          }

          if (e.seg >= path.length - 1 && Math.abs(e.x - target.x) < 3 && Math.abs(e.y - target.y) < 3) {
            state.enemies.splice(i, 1);
            state.lives -= 1;
            syncHud();
            if (state.lives <= 0) state.gameOver = true;
            continue;
          }

          if (e.hp <= 0) {
            state.enemies.splice(i, 1);
            state.coins += e.value;
            syncHud();
          }
        }
      }

      function updateTowers() {
        state.towers.forEach(function (t) {
          t.cooldown -= 1;
          if (t.cooldown > 0) return;

          var center = tileCenter(t.col, t.row);
          var chosen = null;
          var bestSeg = -1;

          for (var i = 0; i < state.enemies.length; i++) {
            var e = state.enemies[i];
            var dist = Math.hypot(e.x - center.x, e.y - center.y);
            if (dist > t.range) continue;
            if (e.seg > bestSeg) {
              chosen = e;
              bestSeg = e.seg;
            }
          }

          if (!chosen) return;

          t.cooldown = t.fireRate;
          state.projectiles.push({
            x: center.x,
            y: center.y,
            tx: chosen,
            speed: t.kind === "blast" ? 5.2 : 7,
            damage: t.damage,
            splash: t.kind === "blast" ? 34 : 0,
            color: t.kind === "blast" ? "#fb7185" : "#0ea5e9"
          });
        });
      }

      function updateProjectiles() {
        for (var i = state.projectiles.length - 1; i >= 0; i--) {
          var p = state.projectiles[i];
          if (!p.tx || p.tx.hp <= 0) {
            state.projectiles.splice(i, 1);
            continue;
          }

          var dx = p.tx.x - p.x;
          var dy = p.tx.y - p.y;
          var d = Math.hypot(dx, dy) || 1;
          p.x += (dx / d) * p.speed;
          p.y += (dy / d) * p.speed;

          if (d < p.speed + 2) {
            if (p.splash > 0) {
              for (var j = 0; j < state.enemies.length; j++) {
                var e = state.enemies[j];
                if (Math.hypot(e.x - p.tx.x, e.y - p.tx.y) <= p.splash) {
                  e.hp -= p.damage;
                }
              }
            } else {
              p.tx.hp -= p.damage;
            }
            state.projectiles.splice(i, 1);
          }
        }
      }

      function update() {
        for (var tick = 0; tick < tickMultiplier; tick++) {
          state.t += 1;
          advanceWaves();
          updateEnemies();
          updateTowers();
          updateProjectiles();
          if (state.gameOver) {
            break;
          }
        }
      }

      function drawGrid() {
        var p = palettes[readTheme()];
        var bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, p.bgB);
        bg.addColorStop(1, p.bgA);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        for (var c = 0; c < COLS; c++) {
          for (var r = 0; r < ROWS; r++) {
            var x = GRID_X + c * TILE;
            var y = GRID_Y + r * TILE;
            var pathTile = isPath(c, r);
            ctx.fillStyle = pathTile ? p.path : ((c + r) % 2 ? p.grass : p.grass2);
            ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
          }
        }

        ctx.strokeStyle = "rgba(0,0,0,0.08)";
        ctx.strokeRect(GRID_X, GRID_Y, COLS * TILE, ROWS * TILE);
      }

      function drawTowers() {
        state.towers.forEach(function (t) {
          var center = tileCenter(t.col, t.row);
          ctx.fillStyle = t.kind === "blast" ? "#fb7185" : "#0ea5e9";
          ctx.beginPath();
          ctx.arc(center.x, center.y, 16, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#0f172a";
          ctx.font = "700 12px Trebuchet MS, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(String(t.level), center.x, center.y + 4);
        });
      }

      function drawEnemies() {
        state.enemies.forEach(function (e) {
          var color = e.kind === "tank" ? "#7c3aed" : (e.kind === "swift" ? "#f59e0b" : "#ef4444");
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(e.x, e.y, 12, 0, Math.PI * 2);
          ctx.fill();

          var ratio = Math.max(0, e.hp / e.maxHp);
          ctx.fillStyle = "rgba(15,23,42,0.5)";
          ctx.fillRect(e.x - 14, e.y - 20, 28, 4);
          ctx.fillStyle = "#22c55e";
          ctx.fillRect(e.x - 14, e.y - 20, 28 * ratio, 4);
        });
      }

      function drawProjectiles() {
        state.projectiles.forEach(function (p) {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.splash > 0 ? 5 : 4, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawOverlay() {
        if (!state.gameOver) return;
        ctx.fillStyle = "rgba(2, 6, 23, 0.64)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "800 42px Trebuchet MS, sans-serif";
        ctx.fillText("Game Over", W / 2, H / 2 - 12);
        ctx.font = "700 20px Trebuchet MS, sans-serif";
        ctx.fillText("Press Restart", W / 2, H / 2 + 22);
      }

      function draw() {
        drawGrid();
        drawTowers();
        drawEnemies();
        drawProjectiles();
        drawOverlay();
      }

      function frame() {
        update();
        draw();
        requestAnimationFrame(frame);
      }

      function buyTower(col, row) {
        if (isPath(col, row) || towerAt(col, row) || state.gameOver) return;

        var cost = selectedType === "blast" ? 70 : 40;
        if (state.coins < cost) return;

        state.coins -= cost;
        state.towers.push({
          col: col,
          row: row,
          kind: selectedType,
          level: 1,
          range: selectedType === "blast" ? 120 : 170,
          damage: selectedType === "blast" ? 16 : 8,
          fireRate: selectedType === "blast" ? 46 : 24,
          cooldown: 8
        });
        syncHud();
      }

      function upgradeTower(t) {
        var cost = 20 + (t.level - 1) * 12;
        if (state.coins < cost || t.level >= 4) return;
        state.coins -= cost;
        t.level += 1;
        t.damage += t.kind === "blast" ? 7 : 3;
        t.range += 10;
        t.fireRate = Math.max(12, t.fireRate - 2);
        syncHud();
      }

      canvas.addEventListener("pointerdown", function (event) {
        var rect = canvas.getBoundingClientRect();
        var sx = canvas.width / rect.width;
        var sy = canvas.height / rect.height;
        var x = (event.clientX - rect.left) * sx;
        var y = (event.clientY - rect.top) * sy;

        var col = Math.floor((x - GRID_X) / TILE);
        var row = Math.floor((y - GRID_Y) / TILE);
        if (col < 0 || row < 0 || col >= COLS || row >= ROWS) return;

        var tower = towerAt(col, row);
        if (tower) {
          upgradeTower(tower);
        } else {
          buyTower(col, row);
        }
      });

      dartBtn.addEventListener("click", function () {
        selectedType = "dart";
        dartBtn.classList.add("active");
        blastBtn.classList.remove("active");
      });

      blastBtn.addEventListener("click", function () {
        selectedType = "blast";
        blastBtn.classList.add("active");
        dartBtn.classList.remove("active");
      });

      difficultySelect.addEventListener("change", function () {
        var value = difficultySelect.value;
        difficulty = Object.prototype.hasOwnProperty.call(DIFFICULTY, value) ? value : "normal";
        reset();
      });

      speedBtn.addEventListener("click", function () {
        tickMultiplier = tickMultiplier === 1 ? 2 : 1;
        speedBtn.textContent = tickMultiplier === 1 ? "Speed 1x" : "Speed 2x";
      });

      restartBtn.addEventListener("click", reset);

      applyTheme();
      window.addEventListener("focus", applyTheme);
      window.addEventListener("storage", function (event) {
        if (event.key === THEME_KEY) {
          applyTheme();
        }
      });
      reset();
      frame();
    })();
  </script>
</body>
</html>
