<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parkcore Trials</title>
  <style>
    :root {
      --bg-a: #f2f7ff;
      --bg-b: #dfeeff;
      --ink: #10294e;
      --panel: rgba(255, 255, 255, 0.8);
      --line: rgba(28, 64, 124, 0.2);
      --accent: #0f6fff;
      --ok: #138f57;
      --danger: #c0364b;
      --player: #0f6fff;
      --goal: #138f57;
      --solid: #244777;
      --hazard: #c0364b;
      --ghost: rgba(255, 255, 255, 0.45);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      background: radial-gradient(circle at 10% -10%, var(--bg-b), transparent 40%), linear-gradient(180deg, var(--bg-a), #f8fbff);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .shell {
      width: min(980px, 96vw);
      display: grid;
      gap: 10px;
    }

    .hud {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      backdrop-filter: blur(4px);
    }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 5px 10px;
      font-size: 0.82rem;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.55);
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      padding: 7px 10px;
      cursor: pointer;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    canvas {
      width: 100%;
      height: auto;
      border-radius: 14px;
      border: 1px solid var(--line);
      box-shadow: 0 12px 24px rgba(16, 41, 78, 0.18);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.75), rgba(227, 240, 255, 0.95));
    }

    .note {
      margin: 0;
      font-size: 0.86rem;
      color: color-mix(in srgb, var(--ink) 72%, white);
    }

    .note b { color: var(--ink); }
  </style>
</head>
<body>
  <section class="shell">
    <div class="hud">
      <div class="chips">
        <span class="chip">Level: <b id="level">1</b></span>
        <span class="chip">Deaths: <b id="deaths">0</b></span>
        <span class="chip">Best Deaths: <b id="best">-</b></span>
        <span class="chip">Time: <b id="timer">0.00s</b></span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <select id="difficulty" class="btn" aria-label="Difficulty">
          <option value="rookie">Rookie</option>
          <option value="normal" selected>Normal</option>
          <option value="insane">Insane</option>
        </select>
        <button id="restart" class="btn" type="button">Restart Level</button>
      </div>
    </div>

    <canvas id="game" width="960" height="500"></canvas>
    <p class="note"><b>Controls:</b> Arrow Keys / WASD to move, Space to jump. Wall-jump + coyote jump are enabled. Reach the green goal.</p>
  </section>

  <script>
    (function () {
      var THEME_KEY = "gamehub_theme";
      var canvas = document.getElementById("game");
      var ctx = canvas.getContext("2d");
      var levelEl = document.getElementById("level");
      var deathsEl = document.getElementById("deaths");
      var bestEl = document.getElementById("best");
      var timerEl = document.getElementById("timer");
      var difficultySelect = document.getElementById("difficulty");
      var restartBtn = document.getElementById("restart");

      var W = canvas.width;
      var H = canvas.height;
      var keys = {};
      var deaths = 0;
      var best = Number(localStorage.getItem("parkcore_trials_best_deaths") || "-1");
      var currentLevel = 0;
      var runFrames = 0;
      var difficulty = "normal";

      var DIFFICULTY = {
        rookie: { accel: 0.78, maxSpeed: 5.8, friction: 0.82, gravity: 0.55, jump: 12.2, wallJump: 11.2, coyote: 10, buffer: 10 },
        normal: { accel: 0.85, maxSpeed: 6.2, friction: 0.78, gravity: 0.62, jump: 11.6, wallJump: 10.8, coyote: 8, buffer: 8 },
        insane: { accel: 0.92, maxSpeed: 6.9, friction: 0.76, gravity: 0.7, jump: 11.2, wallJump: 10.4, coyote: 6, buffer: 6 }
      };

      var palettes = {
        light: {
          bgA: "#f2f7ff", bgB: "#dfeeff", ink: "#10294e", line: "rgba(28,64,124,0.2)",
          solid: "#244777", hazard: "#c0364b", player: "#0f6fff", goal: "#138f57", ghost: "rgba(255,255,255,0.45)"
        },
        gray: {
          bgA: "#222933", bgB: "#3d4655", ink: "#e6edf8", line: "rgba(178,194,216,0.24)",
          solid: "#8aa1c8", hazard: "#ff7d95", player: "#8eb6ff", goal: "#63d39d", ghost: "rgba(255,255,255,0.18)"
        },
        black: {
          bgA: "#0f141b", bgB: "#263041", ink: "#eef3ff", line: "rgba(190,205,232,0.26)",
          solid: "#9db6e8", hazard: "#ff8fa3", player: "#8db4ff", goal: "#63d39d", ghost: "rgba(255,255,255,0.14)"
        }
      };

      function readTheme() {
        var value = "light";
        try {
          value = localStorage.getItem(THEME_KEY) || "light";
        } catch (error) {
          value = "light";
        }
        return ["light", "gray", "black"].indexOf(value) === -1 ? "light" : value;
      }

      function applyTheme() {
        var theme = readTheme();
        var p = palettes[theme];
        document.body.setAttribute("data-theme", theme);
        document.documentElement.style.colorScheme = theme === "black" ? "dark" : "light";
        document.documentElement.style.setProperty("--bg-a", p.bgA);
        document.documentElement.style.setProperty("--bg-b", p.bgB);
        document.documentElement.style.setProperty("--ink", p.ink);
        document.documentElement.style.setProperty("--line", p.line);
      }

      function syncBestLabel() {
        bestEl.textContent = best >= 0 ? String(best) : "-";
      }

      var levels = [
        {
          spawn: { x: 60, y: 420 },
          goal: { x: 860, y: 60, w: 40, h: 40 },
          solids: [
            { x: 0, y: 460, w: 960, h: 40 },
            { x: 120, y: 390, w: 160, h: 20 },
            { x: 340, y: 320, w: 120, h: 20 },
            { x: 500, y: 250, w: 130, h: 20 },
            { x: 700, y: 170, w: 150, h: 20 }
          ],
          hazards: [
            { x: 300, y: 450, w: 28, h: 10 },
            { x: 330, y: 450, w: 28, h: 10 },
            { x: 360, y: 450, w: 28, h: 10 }
          ]
        },
        {
          spawn: { x: 56, y: 420 },
          goal: { x: 882, y: 88, w: 40, h: 40 },
          solids: [
            { x: 0, y: 460, w: 960, h: 40 },
            { x: 0, y: 250, w: 90, h: 210 },
            { x: 180, y: 390, w: 120, h: 16 },
            { x: 360, y: 330, w: 120, h: 16 },
            { x: 550, y: 275, w: 120, h: 16 },
            { x: 740, y: 215, w: 120, h: 16 },
            { x: 910, y: 120, w: 50, h: 340 }
          ],
          hazards: [
            { x: 310, y: 450, w: 46, h: 10 },
            { x: 520, y: 450, w: 46, h: 10 },
            { x: 705, y: 450, w: 46, h: 10 }
          ]
        },
        {
          spawn: { x: 80, y: 120 },
          goal: { x: 880, y: 400, w: 42, h: 42 },
          solids: [
            { x: 0, y: 0, w: 30, h: 500 },
            { x: 930, y: 0, w: 30, h: 500 },
            { x: 0, y: 460, w: 960, h: 40 },
            { x: 90, y: 180, w: 130, h: 16 },
            { x: 280, y: 240, w: 130, h: 16 },
            { x: 470, y: 300, w: 130, h: 16 },
            { x: 660, y: 360, w: 130, h: 16 }
          ],
          hazards: [
            { x: 110, y: 442, w: 120, h: 10 },
            { x: 300, y: 442, w: 120, h: 10 },
            { x: 490, y: 442, w: 120, h: 10 },
            { x: 680, y: 442, w: 120, h: 10 }
          ]
        }
      ];

      var state;

      function resetLevel() {
        var L = levels[currentLevel];
        state = {
          x: L.spawn.x,
          y: L.spawn.y,
          w: 24,
          h: 24,
          vx: 0,
          vy: 0,
          grounded: false,
          coyote: 0,
          jumpBuffer: 0,
          wallDir: 0,
          won: false,
          winTimer: 0
        };
        levelEl.textContent = String(currentLevel + 1);
        deathsEl.textContent = String(deaths);
        syncBestLabel();
      }

      function die() {
        deaths += 1;
        deathsEl.textContent = String(deaths);
        resetLevel();
      }

      function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function moveAndCollide(axis) {
        var L = levels[currentLevel];
        var solids = L.solids;
        state.wallDir = 0;

        for (var i = 0; i < solids.length; i++) {
          var s = solids[i];
          if (!rectsOverlap(state, s)) continue;

          if (axis === "x") {
            if (state.vx > 0) {
              state.x = s.x - state.w;
              state.wallDir = 1;
            } else if (state.vx < 0) {
              state.x = s.x + s.w;
              state.wallDir = -1;
            }
            state.vx = 0;
          } else {
            if (state.vy > 0) {
              state.y = s.y - state.h;
              state.vy = 0;
              state.grounded = true;
              state.coyote = DIFFICULTY[difficulty].coyote;
            } else if (state.vy < 0) {
              state.y = s.y + s.h;
              state.vy = 0;
            }
          }
        }
      }

      function update() {
        runFrames += 1;
        timerEl.textContent = (runFrames / 60).toFixed(2) + "s";

        if (state.won) {
          state.winTimer -= 1;
          if (state.winTimer <= 0) {
            currentLevel = (currentLevel + 1) % levels.length;
            resetLevel();
          }
          return;
        }

        var left = !!(keys["arrowleft"] || keys["a"]);
        var right = !!(keys["arrowright"] || keys["d"]);
        var jumpPressed = !!keys["jumpPressed"];
        keys["jumpPressed"] = false;

        if (jumpPressed) {
          state.jumpBuffer = DIFFICULTY[difficulty].buffer;
        } else if (state.jumpBuffer > 0) {
          state.jumpBuffer -= 1;
        }

        state.grounded = false;

        var cfg = DIFFICULTY[difficulty];
        var accel = cfg.accel;
        var maxSpeed = cfg.maxSpeed;
        var friction = cfg.friction;

        if (left && !right) {
          state.vx = Math.max(-maxSpeed, state.vx - accel);
        } else if (right && !left) {
          state.vx = Math.min(maxSpeed, state.vx + accel);
        } else {
          state.vx *= friction;
          if (Math.abs(state.vx) < 0.05) state.vx = 0;
        }

        if (state.coyote > 0) state.coyote -= 1;

        if (state.jumpBuffer > 0) {
          if (state.coyote > 0) {
            state.vy = -cfg.jump;
            state.coyote = 0;
            state.jumpBuffer = 0;
          } else if (state.wallDir !== 0 && state.vy > -4) {
            state.vy = -cfg.wallJump;
            state.vx = state.wallDir === 1 ? -6.6 : 6.6;
            state.jumpBuffer = 0;
          }
        }

        state.vy += cfg.gravity;
        if (state.vy > 14) state.vy = 14;

        state.x += state.vx;
        moveAndCollide("x");

        state.y += state.vy;
        moveAndCollide("y");

        var L = levels[currentLevel];
        for (var i = 0; i < L.hazards.length; i++) {
          if (rectsOverlap(state, L.hazards[i])) {
            die();
            return;
          }
        }

        if (state.y > H + 60 || state.y < -120 || state.x < -120 || state.x > W + 120) {
          die();
          return;
        }

        if (rectsOverlap(state, L.goal)) {
          state.won = true;
          state.winTimer = 36;
          if (best < 0 || deaths < best) {
            best = deaths;
            localStorage.setItem("parkcore_trials_best_deaths", String(best));
            syncBestLabel();
          }
        }
      }

      function draw() {
        var theme = palettes[readTheme()];
        ctx.clearRect(0, 0, W, H);

        var bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, theme.bgB);
        bg.addColorStop(1, theme.bgA);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = theme.ghost;
        for (var i = 0; i < 7; i++) {
          var x = ((i * 180) - (performance.now() * 0.02)) % (W + 180);
          if (x < -160) x += W + 180;
          ctx.fillRect(x, 60 + i * 20, 120, 16);
        }

        var L = levels[currentLevel];

        ctx.fillStyle = theme.solid;
        L.solids.forEach(function (s) {
          ctx.fillRect(s.x, s.y, s.w, s.h);
        });

        ctx.fillStyle = theme.hazard;
        L.hazards.forEach(function (h) {
          for (var x = h.x; x < h.x + h.w; x += 10) {
            ctx.beginPath();
            ctx.moveTo(x, h.y + h.h);
            ctx.lineTo(x + 5, h.y);
            ctx.lineTo(x + 10, h.y + h.h);
            ctx.fill();
          }
        });

        ctx.fillStyle = theme.goal;
        ctx.fillRect(L.goal.x, L.goal.y, L.goal.w, L.goal.h);
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.fillRect(L.goal.x + 7, L.goal.y + 7, 12, 12);

        ctx.fillStyle = theme.player;
        ctx.fillRect(state.x, state.y, state.w, state.h);

        if (state.won) {
          ctx.fillStyle = "rgba(0,0,0,0.25)";
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = "#fff";
          ctx.textAlign = "center";
          ctx.font = "800 42px Trebuchet MS, sans-serif";
          ctx.fillText("Level Clear", W / 2, H / 2 - 12);
          ctx.font = "700 20px Trebuchet MS, sans-serif";
          ctx.fillText("Loading next trial...", W / 2, H / 2 + 22);
        }
      }

      function frame() {
        update();
        draw();
        requestAnimationFrame(frame);
      }

      document.addEventListener("keydown", function (event) {
        var key = (event.key || "").toLowerCase();
        if (key === " " || key === "arrowup" || key === "w") {
          event.preventDefault();
          keys["jumpPressed"] = true;
        }
        keys[key] = true;
        if (key === "r") {
          resetLevel();
        }
      });

      document.addEventListener("keyup", function (event) {
        keys[(event.key || "").toLowerCase()] = false;
      });

      restartBtn.addEventListener("click", resetLevel);
      difficultySelect.addEventListener("change", function () {
        var value = difficultySelect.value;
        difficulty = Object.prototype.hasOwnProperty.call(DIFFICULTY, value) ? value : "normal";
        deaths = 0;
        runFrames = 0;
        deathsEl.textContent = "0";
        timerEl.textContent = "0.00s";
        resetLevel();
      });

      applyTheme();
      window.addEventListener("focus", applyTheme);
      window.addEventListener("storage", function (event) {
        if (event.key === THEME_KEY) {
          applyTheme();
        }
      });
      syncBestLabel();
      resetLevel();
      frame();
    })();
  </script>
</body>
</html>
