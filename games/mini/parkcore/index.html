<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parkcore Forge</title>
  <style>
    :root {
      --bg-a: #f2f7ff;
      --bg-b: #dcecff;
      --ink: #10294e;
      --line: rgba(28,64,124,0.2);
      --panel: rgba(255,255,255,0.82);
      --accent: #0f6fff;
      --good: #1d9357;
      --danger: #c0364b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 8% -10%, var(--bg-b), transparent 42%), linear-gradient(180deg, var(--bg-a), #f8fbff);
      display: grid;
      place-items: center;
      padding: 14px;
    }
    .shell {
      width: min(1040px, 96vw);
      display: grid;
      gap: 10px;
    }
    .hud {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 10px 12px;
      backdrop-filter: blur(4px);
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 5px 10px;
      font-size: 0.82rem;
      font-weight: 800;
      background: rgba(255,255,255,0.6);
    }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,0.74);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      padding: 7px 10px;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    canvas {
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(227,240,255,0.95));
      box-shadow: 0 12px 24px rgba(16,41,78,0.18);
    }
    .note {
      margin: 0;
      font-size: 0.86rem;
      color: color-mix(in srgb, var(--ink) 70%, white);
    }
    .note b { color: var(--ink); }

    .meta-panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 10px 12px;
      display: grid;
      gap: 8px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px;
      align-items: start;
    }

    .mini-label {
      font-size: 0.8rem;
      font-weight: 800;
      color: color-mix(in srgb, var(--ink) 80%, white);
      margin-bottom: 4px;
      display: block;
    }

    .leaderboard {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .leaderboard th,
    .leaderboard td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 5px 4px;
    }

    .leaderboard th {
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: color-mix(in srgb, var(--ink) 75%, white);
    }
  </style>
</head>
<body>
  <section class="shell">
    <div class="hud">
      <div class="chips">
        <span class="chip">Map: <b id="mapNum">1</b></span>
        <span class="chip">Seed: <b id="seedOut">-</b></span>
        <span class="chip">Deaths: <b id="deaths">0</b></span>
        <span class="chip">Best Deaths: <b id="best">-</b></span>
        <span class="chip">Time: <b id="timer">0.00s</b></span>
      </div>
      <div class="tools">
        <select id="difficulty" class="btn" aria-label="Difficulty">
          <option value="rookie">Rookie</option>
          <option value="normal" selected>Normal</option>
          <option value="insane">Insane</option>
        </select>
        <button id="newMap" class="btn" type="button">New Random Map</button>
        <button id="restart" class="btn" type="button">Restart</button>
      </div>
    </div>
    <canvas id="game" width="1000" height="520"></canvas>
    <p class="note"><b>Controls:</b> Arrow keys / WASD move, Space jump, wall jump on contact. Reach the green portal.</p>

    <section class="meta-panel">
      <div class="meta-grid">
        <div>
          <span class="mini-label">Player Skin</span>
          <select id="skinSelect" class="btn" aria-label="Player skin"></select>
        </div>
        <div>
          <span class="mini-label">Progress</span>
          <div class="chips">
            <span class="chip">Maps Cleared: <b id="clearsOut">0</b></span>
            <span class="chip">Unlocked Skins: <b id="skinsOut">1</b></span>
          </div>
        </div>
      </div>
      <div>
        <span class="mini-label">Recent Clears</span>
        <table class="leaderboard" aria-label="Parkcore leaderboard">
          <thead>
            <tr><th>#</th><th>Map</th><th>Seed</th><th>Deaths</th><th>Time</th><th>Mode</th></tr>
          </thead>
          <tbody id="leaderboardBody"></tbody>
        </table>
      </div>
    </section>
  </section>

  <script>
    (function () {
      var THEME_KEY = "gamehub_theme";
      var BEST_KEY = "parkcore_forge_best_deaths";
      var CLEARS_KEY = "parkcore_forge_clears";
      var SKIN_KEY = "parkcore_forge_skin";
      var LEADERBOARD_KEY = "parkcore_forge_leaderboard";
      var canvas = document.getElementById("game");
      var ctx = canvas.getContext("2d");
      var mapNumEl = document.getElementById("mapNum");
      var seedOutEl = document.getElementById("seedOut");
      var deathsEl = document.getElementById("deaths");
      var bestEl = document.getElementById("best");
      var timerEl = document.getElementById("timer");
      var clearsEl = document.getElementById("clearsOut");
      var skinsEl = document.getElementById("skinsOut");
      var skinSelect = document.getElementById("skinSelect");
      var leaderboardBody = document.getElementById("leaderboardBody");
      var difficultySelect = document.getElementById("difficulty");
      var newMapBtn = document.getElementById("newMap");
      var restartBtn = document.getElementById("restart");

      var W = canvas.width;
      var H = canvas.height;
      var FLOOR_Y = H - 36;
      var keys = {};
      var mapCount = 1;
      var deaths = 0;
      var runFrames = 0;
      var best = Number(localStorage.getItem(BEST_KEY) || "-1");
      var clears = Number(localStorage.getItem(CLEARS_KEY) || "0");
      var difficulty = "normal";
      var activeSeed = Date.now() % 1000000;
      var skinId = localStorage.getItem(SKIN_KEY) || "classic";
      var leaderboard = [];

      try {
        leaderboard = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]");
        if (!Array.isArray(leaderboard)) leaderboard = [];
      } catch (error) {
        leaderboard = [];
      }

      var DIFFICULTY = {
        rookie: { accel: 0.78, maxSpeed: 5.8, friction: 0.84, gravity: 0.52, jump: 12.6, wallJump: 11.8, coyote: 11, buffer: 10, hazardMult: 0.75, movingPlatforms: 1 },
        normal: { accel: 0.86, maxSpeed: 6.3, friction: 0.8, gravity: 0.62, jump: 11.7, wallJump: 10.9, coyote: 8, buffer: 8, hazardMult: 1.0, movingPlatforms: 2 },
        insane: { accel: 0.95, maxSpeed: 7.0, friction: 0.76, gravity: 0.71, jump: 11.2, wallJump: 10.3, coyote: 6, buffer: 6, hazardMult: 1.2, movingPlatforms: 3 }
      };

      var palettes = {
        light: { bgA: "#f2f7ff", bgB: "#dcecff", ink: "#10294e", line: "rgba(28,64,124,0.2)", solid: "#264a7e", hazard: "#c0364b", player: "#0f6fff", goal: "#1d9357", cloud: "rgba(255,255,255,0.45)" },
        gray: { bgA: "#232b37", bgB: "#3b4757", ink: "#e6edf8", line: "rgba(178,194,216,0.24)", solid: "#8fa8cf", hazard: "#ff7f97", player: "#8eb6ff", goal: "#63d39d", cloud: "rgba(255,255,255,0.18)" },
        black: { bgA: "#0f141b", bgB: "#273142", ink: "#eef3ff", line: "rgba(190,205,232,0.26)", solid: "#9db7e9", hazard: "#ff90a5", player: "#8db5ff", goal: "#63d39d", cloud: "rgba(255,255,255,0.14)" }
      };

      var skins = {
        classic: { name: "Classic", unlockAt: 0, fill: "#0f6fff" },
        neon: { name: "Neon", unlockAt: 6, fill: "#d8ff4e" },
        ember: { name: "Ember", unlockAt: 15, fill: "#ffb45f" },
        cobalt: { name: "Cobalt", unlockAt: 28, fill: "#88bcff" }
      };

      function rng(seed) {
        var s = seed >>> 0;
        return function () {
          s = (s * 1664525 + 1013904223) >>> 0;
          return s / 4294967296;
        };
      }

      function readTheme() {
        var t = "light";
        try { t = localStorage.getItem(THEME_KEY) || "light"; } catch (error) { t = "light"; }
        return ["light", "gray", "black"].indexOf(t) === -1 ? "light" : t;
      }

      function applyTheme() {
        var p = palettes[readTheme()];
        document.documentElement.style.setProperty("--bg-a", p.bgA);
        document.documentElement.style.setProperty("--bg-b", p.bgB);
        document.documentElement.style.setProperty("--ink", p.ink);
        document.documentElement.style.setProperty("--line", p.line);
        document.documentElement.style.colorScheme = readTheme() === "black" ? "dark" : "light";
      }

      function syncBest() {
        bestEl.textContent = best >= 0 ? String(best) : "-";
      }

      function unlockedSkinIds() {
        return Object.keys(skins).filter(function (id) {
          return clears >= skins[id].unlockAt;
        });
      }

      function ensureSkinUnlocked() {
        var unlocked = unlockedSkinIds();
        if (unlocked.indexOf(skinId) === -1) {
          skinId = unlocked[0] || "classic";
        }
        localStorage.setItem(SKIN_KEY, skinId);
      }

      function storeLeaderboard() {
        localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(leaderboard));
      }

      function syncProgressUi() {
        clearsEl.textContent = String(clears);
        var unlocked = unlockedSkinIds();
        skinsEl.textContent = String(unlocked.length);

        skinSelect.innerHTML = "";
        unlocked.forEach(function (id) {
          var opt = document.createElement("option");
          opt.value = id;
          opt.textContent = skins[id].name;
          skinSelect.appendChild(opt);
        });
        ensureSkinUnlocked();
        skinSelect.value = skinId;

        leaderboardBody.innerHTML = "";
        if (!leaderboard.length) {
          var emptyRow = document.createElement("tr");
          emptyRow.innerHTML = "<td colspan=\"6\">No clears yet. Finish maps to fill this board.</td>";
          leaderboardBody.appendChild(emptyRow);
          return;
        }

        leaderboard.forEach(function (entry, index) {
          var tr = document.createElement("tr");
          tr.innerHTML = "<td>" + (index + 1) + "</td>" +
            "<td>" + entry.map + "</td>" +
            "<td>" + entry.seed + "</td>" +
            "<td>" + entry.deaths + "</td>" +
            "<td>" + entry.time.toFixed(2) + "s</td>" +
            "<td>" + entry.mode + "</td>";
          leaderboardBody.appendChild(tr);
        });
      }

      function recordClear() {
        leaderboard.push({
          map: mapCount,
          seed: activeSeed,
          deaths: deaths,
          time: runFrames / 60,
          mode: difficulty
        });

        leaderboard.sort(function (a, b) {
          if (a.map !== b.map) return b.map - a.map;
          if (a.deaths !== b.deaths) return a.deaths - b.deaths;
          return a.time - b.time;
        });

        leaderboard = leaderboard.slice(0, 12);
        storeLeaderboard();
      }

      function makeMap(seed) {
        var rand = rng(seed);
        var cfg = DIFFICULTY[difficulty];
        var platforms = [
          { x: 0, y: FLOOR_Y, w: W, h: 36, type: "solid" }
        ];
        var hazards = [];

        var x = 120;
        var y = FLOOR_Y - 64;
        var i;
        for (i = 0; i < 14; i++) {
          var w = 110 + Math.floor(rand() * 90);
          var dy = Math.floor((rand() - 0.5) * 120);
          y = Math.max(90, Math.min(FLOOR_Y - 70, y + dy));
          platforms.push({ x: x, y: y, w: w, h: 16, type: "solid" });

          if (rand() < 0.55 * cfg.hazardMult) {
            var spikeCount = 2 + Math.floor(rand() * 4);
            hazards.push({ x: x + 8, y: y - 10, w: spikeCount * 12, h: 10 });
          }

          x += 95 + Math.floor(rand() * 75);
        }

        for (i = 0; i < cfg.movingPlatforms; i++) {
          var px = 240 + Math.floor(rand() * 520);
          var py = 130 + Math.floor(rand() * 250);
          var span = 60 + Math.floor(rand() * 90);
          var speed = 1 + rand() * 1.4;
          platforms.push({ x: px, y: py, w: 90, h: 14, type: "moving", baseX: px, span: span, speed: speed, phase: rand() * Math.PI * 2 });
        }

        var goal = { x: Math.min(W - 80, x + 15), y: Math.max(74, y - 40), w: 42, h: 42 };
        var spawn = { x: 60, y: FLOOR_Y - 24 };

        return { spawn: spawn, goal: goal, platforms: platforms, hazards: hazards };
      }

      var map = makeMap(activeSeed);
      var state = null;

      function resetState() {
        var cfg = DIFFICULTY[difficulty];
        state = {
          x: map.spawn.x,
          y: map.spawn.y,
          w: 24,
          h: 24,
          vx: 0,
          vy: 0,
          grounded: false,
          coyote: 0,
          jumpBuffer: 0,
          wallDir: 0,
          won: false,
          winTimer: 0,
          prevX: map.spawn.x,
          prevY: map.spawn.y,
          cfg: cfg
        };
        mapNumEl.textContent = String(mapCount);
        seedOutEl.textContent = String(activeSeed);
        deathsEl.textContent = String(deaths);
        syncBest();
      }

      function hardResetNewMap() {
        activeSeed = Math.floor(Math.random() * 1000000);
        map = makeMap(activeSeed);
        deaths = 0;
        runFrames = 0;
        timerEl.textContent = "0.00s";
        resetState();
      }

      function die() {
        deaths += 1;
        deathsEl.textContent = String(deaths);
        resetState();
      }

      function rectOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function updateMovingPlatforms(t) {
        map.platforms.forEach(function (p) {
          if (p.type !== "moving") return;
          p.x = p.baseX + Math.sin((t * 0.02 * p.speed) + p.phase) * p.span;
        });
      }

      function collideAxis(axis) {
        state.wallDir = 0;
        for (var i = 0; i < map.platforms.length; i++) {
          var p = map.platforms[i];
          if (!rectOverlap(state, p)) continue;

          if (axis === "x") {
            if (state.vx > 0) {
              state.x = p.x - state.w;
              state.wallDir = 1;
            } else if (state.vx < 0) {
              state.x = p.x + p.w;
              state.wallDir = -1;
            }
            state.vx = 0;
          } else {
            if (state.vy > 0) {
              state.y = p.y - state.h;
              state.vy = 0;
              state.grounded = true;
              state.coyote = state.cfg.coyote;
              if (p.type === "moving") {
                state.x += (p.x - state.prevPlatX || 0);
              }
            } else if (state.vy < 0) {
              state.y = p.y + p.h;
              state.vy = 0;
            }
          }
        }
      }

      function update() {
        runFrames += 1;
        timerEl.textContent = (runFrames / 60).toFixed(2) + "s";

        if (state.won) {
          state.winTimer -= 1;
          if (state.winTimer <= 0) {
            mapCount += 1;
            activeSeed = Math.floor(Math.random() * 1000000);
            map = makeMap(activeSeed);
            resetState();
          }
          return;
        }

        updateMovingPlatforms(runFrames);

        var left = !!(keys.arrowleft || keys.a);
        var right = !!(keys.arrowright || keys.d);
        var jumpPressed = !!keys.jumpPressed;
        keys.jumpPressed = false;

        if (jumpPressed) {
          state.jumpBuffer = state.cfg.buffer;
        } else if (state.jumpBuffer > 0) {
          state.jumpBuffer -= 1;
        }

        state.grounded = false;
        if (left && !right) {
          state.vx = Math.max(-state.cfg.maxSpeed, state.vx - state.cfg.accel);
        } else if (right && !left) {
          state.vx = Math.min(state.cfg.maxSpeed, state.vx + state.cfg.accel);
        } else {
          state.vx *= state.cfg.friction;
          if (Math.abs(state.vx) < 0.05) state.vx = 0;
        }

        if (state.coyote > 0) state.coyote -= 1;

        if (state.jumpBuffer > 0) {
          if (state.coyote > 0) {
            state.vy = -state.cfg.jump;
            state.coyote = 0;
            state.jumpBuffer = 0;
          } else if (state.wallDir !== 0 && state.vy > -4) {
            state.vy = -state.cfg.wallJump;
            state.vx = state.wallDir === 1 ? -6.6 : 6.6;
            state.jumpBuffer = 0;
          }
        }

        state.vy += state.cfg.gravity;
        if (state.vy > 14) state.vy = 14;

        state.prevX = state.x;
        state.prevY = state.y;

        state.x += state.vx;
        collideAxis("x");

        state.y += state.vy;
        collideAxis("y");

        for (var i = 0; i < map.hazards.length; i++) {
          if (rectOverlap(state, map.hazards[i])) {
            die();
            return;
          }
        }

        if (state.y > H + 80 || state.x < -120 || state.x > W + 120 || state.y < -180) {
          die();
          return;
        }

        if (rectOverlap(state, map.goal)) {
          state.won = true;
          state.winTimer = 38;
          clears += 1;
          localStorage.setItem(CLEARS_KEY, String(clears));
          recordClear();
          syncProgressUi();
          if (best < 0 || deaths < best) {
            best = deaths;
            localStorage.setItem(BEST_KEY, String(best));
            syncBest();
          }
        }
      }

      function draw() {
        var p = palettes[readTheme()];
        ctx.clearRect(0, 0, W, H);

        var bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, p.bgB);
        bg.addColorStop(1, p.bgA);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = p.cloud;
        for (var i = 0; i < 8; i++) {
          var cx = ((i * 170) - (performance.now() * 0.018)) % (W + 180);
          if (cx < -160) cx += W + 180;
          ctx.fillRect(cx, 62 + i * 18, 120, 16);
        }

        ctx.fillStyle = p.solid;
        map.platforms.forEach(function (plat) {
          ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
        });

        ctx.fillStyle = p.hazard;
        map.hazards.forEach(function (h) {
          for (var x = h.x; x < h.x + h.w; x += 12) {
            ctx.beginPath();
            ctx.moveTo(x, h.y + h.h);
            ctx.lineTo(x + 6, h.y);
            ctx.lineTo(x + 12, h.y + h.h);
            ctx.fill();
          }
        });

        ctx.fillStyle = p.goal;
        ctx.fillRect(map.goal.x, map.goal.y, map.goal.w, map.goal.h);
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.fillRect(map.goal.x + 7, map.goal.y + 7, 12, 12);

        ctx.fillStyle = (skins[skinId] || skins.classic).fill;
        ctx.fillRect(state.x, state.y, state.w, state.h);

        if (state.won) {
          ctx.fillStyle = "rgba(0,0,0,0.25)";
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = "#fff";
          ctx.textAlign = "center";
          ctx.font = "800 42px Trebuchet MS, sans-serif";
          ctx.fillText("Map Clear", W / 2, H / 2 - 12);
          ctx.font = "700 20px Trebuchet MS, sans-serif";
          ctx.fillText("Generating next random map...", W / 2, H / 2 + 22);
        }
      }

      function frame() {
        update();
        draw();
        requestAnimationFrame(frame);
      }

      document.addEventListener("keydown", function (event) {
        var key = (event.key || "").toLowerCase();
        if (key === " " || key === "arrowup" || key === "w") {
          event.preventDefault();
          keys.jumpPressed = true;
        }
        keys[key] = true;
        if (key === "r") resetState();
      });

      document.addEventListener("keyup", function (event) {
        keys[(event.key || "").toLowerCase()] = false;
      });

      difficultySelect.addEventListener("change", function () {
        var val = difficultySelect.value;
        difficulty = Object.prototype.hasOwnProperty.call(DIFFICULTY, val) ? val : "normal";
        hardResetNewMap();
      });

      skinSelect.addEventListener("change", function () {
        skinId = skinSelect.value;
        ensureSkinUnlocked();
        syncProgressUi();
      });

      newMapBtn.addEventListener("click", hardResetNewMap);
      restartBtn.addEventListener("click", resetState);

      applyTheme();
      window.addEventListener("focus", applyTheme);
      window.addEventListener("storage", function (event) {
        if (event.key === THEME_KEY) {
          applyTheme();
        }
      });

      syncBest();
      ensureSkinUnlocked();
      syncProgressUi();
      resetState();
      frame();
    })();
  </script>
</body>
</html>
