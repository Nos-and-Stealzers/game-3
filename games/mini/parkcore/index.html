<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parkcore Sprint</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --ink: #e2e8f0;
      --accent: #22d3ee;
      --warn: #fb7185;
      --ok: #34d399;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      background: radial-gradient(circle at 20% 0%, #1d2a48 0, transparent 45%), linear-gradient(180deg, var(--bg2), var(--bg1));
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 14px;
    }
    .shell {
      width: min(980px, 96vw);
      display: grid;
      gap: 10px;
    }
    .hud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(4px);
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      padding: 5px 9px;
      font-size: 0.82rem;
      font-weight: 700;
      background: rgba(30, 41, 59, 0.6);
    }
    .chip strong { color: #fff; }
    .btn {
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-radius: 10px;
      background: rgba(30, 41, 59, 0.7);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      padding: 7px 10px;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--accent); color: #fff; }
    canvas {
      width: 100%;
      height: auto;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: linear-gradient(180deg, #0d1b36 0%, #172f54 60%, #122844 100%);
      box-shadow: 0 12px 24px rgba(2, 8, 23, 0.45);
    }
    .note {
      font-size: 0.86rem;
      color: #b9c5da;
      margin: 0;
    }
    .note b { color: #f8fafc; }
  </style>
</head>
<body>
  <section class="shell">
    <div class="hud">
      <div class="chips">
        <span class="chip">Score: <strong id="score">0</strong></span>
        <span class="chip">Best: <strong id="best">0</strong></span>
        <span class="chip">Speed: <strong id="speed">1.0x</strong></span>
      </div>
      <button id="restartBtn" class="btn" type="button">Restart</button>
    </div>
    <canvas id="game" width="960" height="420" aria-label="Parkcore Sprint"></canvas>
    <p class="note"><b>Controls:</b> Space / Arrow Up to jump (double jump enabled). R to restart.</p>
  </section>

  <script>
    (function () {
      var canvas = document.getElementById("game");
      var ctx = canvas.getContext("2d");
      var scoreEl = document.getElementById("score");
      var bestEl = document.getElementById("best");
      var speedEl = document.getElementById("speed");
      var restartBtn = document.getElementById("restartBtn");

      var W = canvas.width;
      var H = canvas.height;
      var GROUND = H - 70;

      var best = Number(localStorage.getItem("parkcore_best") || 0);
      bestEl.textContent = String(best);

      var state;

      function reset() {
        state = {
          t: 0,
          score: 0,
          dead: false,
          speed: 7,
          spawnTimer: 80,
          obstacles: [],
          particles: [],
          player: {
            x: 140,
            y: GROUND - 56,
            w: 38,
            h: 56,
            vy: 0,
            jumpsLeft: 2,
            grounded: true
          }
        };
        scoreEl.textContent = "0";
        speedEl.textContent = "1.0x";
      }

      function spawnObstacle() {
        var tall = Math.random() < 0.45;
        var w = tall ? 34 : 46;
        var h = tall ? 92 : 52;
        state.obstacles.push({
          x: W + 10,
          y: GROUND - h,
          w: w,
          h: h,
          color: tall ? "#fb7185" : "#f59e0b"
        });
      }

      function jump() {
        if (state.dead) return;
        var p = state.player;
        if (p.jumpsLeft <= 0) return;
        p.vy = p.jumpsLeft === 2 ? -14 : -12;
        p.jumpsLeft -= 1;
        p.grounded = false;
      }

      function collide(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function update() {
        state.t += 1;
        if (state.dead) return;

        var p = state.player;
        p.vy += 0.68;
        p.y += p.vy;

        if (p.y + p.h >= GROUND) {
          p.y = GROUND - p.h;
          p.vy = 0;
          p.grounded = true;
          p.jumpsLeft = 2;
        }

        state.spawnTimer -= 1;
        if (state.spawnTimer <= 0) {
          spawnObstacle();
          var gap = Math.max(36, 95 - Math.floor(state.speed * 4));
          state.spawnTimer = gap + Math.floor(Math.random() * 26);
        }

        state.speed += 0.0012;
        speedEl.textContent = state.speed.toFixed(1) + "x";

        for (var i = state.obstacles.length - 1; i >= 0; i--) {
          var o = state.obstacles[i];
          o.x -= state.speed;
          if (o.x + o.w < -10) {
            state.obstacles.splice(i, 1);
            state.score += 10;
            continue;
          }
          if (collide(state.player, o)) {
            state.dead = true;
            if (state.score > best) {
              best = state.score;
              localStorage.setItem("parkcore_best", String(best));
              bestEl.textContent = String(best);
            }
          }
        }

        if (state.t % 2 === 0) {
          state.score += 1;
        }
        scoreEl.textContent = String(state.score);
      }

      function drawSky() {
        var grd = ctx.createLinearGradient(0, 0, 0, GROUND);
        grd.addColorStop(0, "#1a2f59");
        grd.addColorStop(1, "#203f6f");
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, W, GROUND);

        ctx.fillStyle = "rgba(255,255,255,0.08)";
        for (var i = 0; i < 8; i++) {
          var x = ((state.t * 0.35) + i * 160) % (W + 120) - 120;
          ctx.fillRect(x, 70 + i * 8, 90, 18);
        }
      }

      function drawGround() {
        ctx.fillStyle = "#0a1325";
        ctx.fillRect(0, GROUND, W, H - GROUND);
        ctx.fillStyle = "#22d3ee";
        for (var i = 0; i < 28; i++) {
          var x = ((i * 50) - (state.t * state.speed * 1.8)) % (W + 50);
          if (x < -20) x += W + 50;
          ctx.fillRect(x, GROUND + 8, 26, 4);
        }
      }

      function drawPlayer() {
        var p = state.player;
        ctx.fillStyle = "#34d399";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = "#064e3b";
        ctx.fillRect(p.x + 8, p.y + 12, 8, 8);
        ctx.fillRect(p.x + 22, p.y + 12, 8, 8);
      }

      function drawObstacles() {
        state.obstacles.forEach(function (o) {
          ctx.fillStyle = o.color;
          ctx.fillRect(o.x, o.y, o.w, o.h);
          ctx.fillStyle = "rgba(0,0,0,0.22)";
          ctx.fillRect(o.x + 5, o.y + 6, o.w - 10, 6);
        });
      }

      function drawOverlay() {
        if (!state.dead) return;
        ctx.fillStyle = "rgba(2, 6, 23, 0.65)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#f8fafc";
        ctx.textAlign = "center";
        ctx.font = "800 42px Trebuchet MS, sans-serif";
        ctx.fillText("Run Over", W / 2, H / 2 - 20);
        ctx.font = "700 20px Trebuchet MS, sans-serif";
        ctx.fillText("Press R or Restart", W / 2, H / 2 + 20);
      }

      function frame() {
        update();
        drawSky();
        drawGround();
        drawPlayer();
        drawObstacles();
        drawOverlay();
        requestAnimationFrame(frame);
      }

      document.addEventListener("keydown", function (event) {
        var key = (event.key || "").toLowerCase();
        if (key === " " || key === "arrowup" || key === "w") {
          event.preventDefault();
          jump();
        }
        if (key === "r") {
          reset();
        }
      });

      canvas.addEventListener("pointerdown", function () {
        if (state.dead) {
          reset();
        } else {
          jump();
        }
      });

      restartBtn.addEventListener("click", reset);
      reset();
      frame();
    })();
  </script>
</body>
</html>
